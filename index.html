<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
<meta name="theme-color" content="#fff"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<link rel="manifest" href="./manifest.json"/>
<title>Meu Organizador</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fafafa;--bg2:#fff;--bg3:#f5f5f5;--bg4:#e8e8e8;--brd:#eee;--brd2:#ddd;--txt:#222;--txt2:#666;--txt3:#aaa;--txt4:#ccc;--ac:#222;--acfg:#fff;--card:#fff;--inp:#fff;--hol:#e05;}
[data-theme=dark]{--bg:#111;--bg2:#1a1a1a;--bg3:#252525;--bg4:#0d0d0d;--brd:#2a2a2a;--brd2:#383838;--txt:#eee;--txt2:#aaa;--txt3:#666;--txt4:#444;--ac:#e0e0e0;--acfg:#111;--card:#1e1e1e;--inp:#2a2a2a;--hol:#ff6b8a;}
body{font-family:system-ui,sans-serif;background:var(--bg4);display:flex;justify-content:center;min-height:100vh;padding:.6rem;transition:background .2s}
#app{width:100%;max-width:490px;background:var(--bg);border-radius:18px;border:.5px solid var(--brd);overflow:hidden;display:flex;flex-direction:column;min-height:96vh}
.hdr{background:var(--bg2);border-bottom:.5px solid var(--brd);padding:14px 17px 11px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.hdr h1{font-size:18px;font-weight:500;color:var(--txt)}
.hdr p{font-size:11px;color:var(--txt2);margin-top:4px;font-style:italic;line-height:1.4}
.hdr-r{display:flex;gap:7px;align-items:center}
.ibt{background:none;border:.5px solid var(--brd2);border-radius:9px;padding:6px 8px;cursor:pointer;font-size:16px;line-height:1;display:flex;align-items:center}
.gear-btn{background:none;border:.5px solid var(--brd2);border-radius:9px;padding:7px;cursor:pointer;display:flex;align-items:center;color:var(--txt2)}
.cnt{flex:1;overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;position:relative}
.sec{display:none;padding:1.2rem 1.1rem;flex:1;flex-direction:column}
.sec.active{display:flex}
.tabbar{display:flex;border-top:.5px solid var(--brd);background:var(--bg2);flex-shrink:0}
.tb{flex:1;padding:11px 2px 9px;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--txt4);font-size:11px;font-family:inherit;transition:color .15s}
.tb.active{color:var(--txt);font-weight:500}
.tb svg{width:18px;height:18px}
input,textarea,select{padding:9px 12px;border-radius:9px;border:.5px solid var(--brd2);font-size:14px;outline:none;font-family:inherit;background:var(--inp);color:var(--txt)}
textarea{resize:none;line-height:1.65;width:100%}
.ib{padding:9px 15px;border-radius:9px;border:none;background:var(--ac);color:var(--acfg);font-size:18px;cursor:pointer;flex-shrink:0}
.bd{background:none;border:none;cursor:pointer;color:var(--txt4);font-size:16px;padding:0 4px;flex-shrink:0}
.lbl{font-size:11px;color:var(--txt3);margin-bottom:5px;font-weight:500;letter-spacing:.07em;text-transform:uppercase}
.empty{text-align:center;color:var(--txt4);font-size:14px;margin-top:2rem}
.bbk{background:none;border:.5px solid var(--brd2);border-radius:9px;padding:7px 12px;cursor:pointer;font-size:13px;color:var(--txt2);font-family:inherit}
.bsv{background:var(--ac);color:var(--acfg);border:none;border-radius:9px;padding:7px 14px;font-size:13px;cursor:pointer;font-family:inherit}
/* MODALS */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.mo.open{opacity:1;pointer-events:all}
.md{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-width:490px;max-height:90vh;display:flex;flex-direction:column;transform:translateY(30px);transition:transform .25s}
.mo.open .md{transform:translateY(0)}
.mh{display:flex;justify-content:space-between;align-items:center;padding:16px 19px 13px;border-bottom:.5px solid var(--brd);flex-shrink:0}
.mh h2{font-size:15px;font-weight:500;color:var(--txt)}
.mc{background:none;border:none;font-size:23px;cursor:pointer;color:var(--txt3);line-height:1}
.mb{overflow-y:auto;flex:1;padding:14px 19px}
.mf{padding:12px 19px 20px;flex-shrink:0;border-top:.5px solid var(--brd)}
/* SETTINGS */
.cst{font-size:11px;color:var(--txt3);font-weight:500;letter-spacing:.08em;text-transform:uppercase;margin:15px 0 9px}
.cst:first-child{margin-top:0}
.cr{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:.5px solid var(--brd)}
.cr:last-child{border-bottom:none}
.cl{font-size:14px;color:var(--txt)}
.tog{position:relative;width:44px;height:24px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0;position:absolute}
.tog-s{position:absolute;inset:0;background:var(--brd2);border-radius:24px;cursor:pointer;transition:background .2s}
.tog-s::before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:transform .2s}
.tog input:checked+.tog-s{background:#555}
.tog input:checked+.tog-s::before{transform:translateX(20px)}
.ns{font-size:12px;font-weight:500}.ns.on{color:#3a3}.ns.off{color:var(--txt3)}
.bncfg{background:var(--ac);color:var(--acfg);border:none;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;font-family:inherit}
/* TASKS & BILLS */
.tf{background:var(--card);border-radius:13px;border:.5px solid var(--brd);padding:13px;margin-bottom:1rem;flex-shrink:0}
.tftop{display:flex;gap:7px;margin-bottom:10px}
.tftop input{flex:1}
.tf2{display:flex;gap:6px;flex-wrap:wrap}
.tff{display:flex;flex-direction:column;gap:3px;flex:1;min-width:74px}
.tff label{font-size:10px;color:var(--txt3);font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.tff input,.tff select{font-size:12px;padding:7px 8px}
.ti{display:flex;align-items:flex-start;gap:9px;padding:11px 13px;border-radius:10px;border:.5px solid var(--brd);margin-bottom:6px;background:var(--card)}
.ti.done-item .tt{text-decoration:line-through;color:var(--txt4)}
.tck{width:19px;height:19px;border-radius:50%;border:1.5px solid var(--txt4);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:2px;transition:all .15s}
.tck.done{background:var(--ac);border-color:var(--ac)}
.tb2{flex:1;min-width:0}
.tt{font-size:14px;color:var(--txt);line-height:1.4}
.tm{font-size:11px;color:var(--txt3);margin-top:2px}
.tm.ov{color:#e44}
.dtb{display:flex;gap:1px;flex-shrink:0}
.brev{background:none;border:none;cursor:pointer;font-size:14px;padding:3px 5px;color:var(--txt3)}
.bperm{background:none;border:none;cursor:pointer;font-size:14px;padding:3px 5px;color:#e44}
.dtoggle{width:100%;padding:10px 13px;border-radius:10px;border:.5px solid var(--brd);background:var(--card);text-align:left;color:var(--txt3);font-size:13px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:7px;margin-top:.8rem;flex-shrink:0}
.dtoggle .arr{margin-left:auto;transition:transform .2s;font-size:14px}
.dtoggle.open .arr{transform:rotate(90deg)}
/* NOTES & CARDS SELECTION LOCK */
.nc, .hcard { -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
.ng{display:flex;flex-direction:column;gap:9px;flex:1;overflow-y:auto;overflow-x:hidden}
.nc{border-radius:11px;border:.5px solid var(--brd);padding:14px;cursor:pointer;background:var(--card);transition:transform 0.2s, opacity 0.2s, box-shadow 0.2s}
.nc.dragging, .hcard.dragging { z-index: 10; position: relative; }
.nc h3{font-size:14px;font-weight:500;color:var(--txt);margin-bottom:4px}
.nc p{font-size:12px;color:var(--txt3);margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.nf{display:flex;justify-content:space-between;align-items:center}
.nd{font-size:10px;color:var(--txt4)}
.bnn{width:100%;padding:11px;border-radius:10px;border:.5px dashed var(--brd2);background:transparent;font-size:14px;color:var(--txt3);cursor:pointer;margin-bottom:1rem;font-family:inherit;flex-shrink:0}
#nlv{flex:1;display:flex;flex-direction:column;min-height:0}
.neh{display:flex;justify-content:space-between;align-items:center;margin-bottom:.7rem;flex-shrink:0}
#nt-ttl{border:none;outline:none;font-size:18px;font-weight:500;color:var(--txt);padding:0;margin-bottom:.6rem;border-radius:0;width:100%;background:transparent;flex-shrink:0}
#nt-bdy{border:none;outline:none;font-size:14px;color:var(--txt2);padding:0;border-radius:0;background:transparent;flex:1;min-height:0;height:calc(100svh - 230px)}
#nev{flex:1;display:none;flex-direction:column;overflow:hidden}
#nev.open{display:flex}
/* CALENDAR */
.vrow{display:flex;gap:6px;margin-bottom:.8rem;flex-shrink:0}
.vbtn{flex:1;padding:7px;border-radius:8px;border:.5px solid var(--brd2);background:var(--bg3);color:var(--txt2);font-size:12px;cursor:pointer;font-family:inherit}
.vbtn.sel{background:var(--ac);color:var(--acfg);border-color:var(--ac)}
.srow{display:flex;gap:7px;margin-bottom:.8rem;flex-shrink:0}
.srow input{flex:1;font-size:13px}
.sri{padding:9px 11px;border-radius:9px;border:.5px solid var(--brd);margin-bottom:5px;background:var(--card);cursor:pointer}
.sri-t{font-size:13px;color:var(--txt)}
.sri-m{font-size:11px;color:var(--txt3);margin-top:2px}
.cnr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.8rem}
.cnr span{font-size:14px;font-weight:500;color:var(--txt)}
.cnv{background:none;border:none;font-size:18px;cursor:pointer;color:var(--txt3);padding:4px 8px}
.cdow{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;margin-bottom:3px}
.cdow span{text-align:center;font-size:10px;color:var(--txt4);font-weight:500}
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cc{height:36px;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:7px;cursor:pointer;position:relative;font-size:13px;color:var(--txt)}
.cc:hover{background:var(--bg3)}.cc.past{color:var(--txt4)}.cc.today{background:var(--bg3);font-weight:600}
.cc.sel{background:var(--ac)!important;color:var(--acfg)!important}
.cc.dot::after{content:'';width:3px;height:3px;border-radius:50%;background:currentColor;position:absolute;bottom:3px;opacity:.5}
.cc.sel.dot::after{background:var(--acfg);opacity:.8}
.cc.emp{cursor:default}.cc.emp:hover{background:transparent}
.cc.hol{color:var(--hol)}.cc.sel.hol{color:var(--acfg)}
.evs{margin-top:.8rem;border-top:.5px solid var(--brd);padding-top:.8rem;flex-shrink:0}
.edl{font-size:12px;color:var(--txt3);margin-bottom:8px}
.holbanner{background:rgba(200,0,50,.07);border:.5px solid rgba(200,0,50,.18);border-radius:8px;padding:6px 10px;margin-bottom:8px;font-size:12px;color:var(--hol);display:flex;align-items:center;gap:5px}
.ef{display:flex;flex-direction:column;gap:6px;margin-bottom:.8rem}
.efr{display:flex;gap:6px;align-items:flex-end}
.efl{display:flex;flex-direction:column;gap:3px;flex:1}
.efl label{font-size:10px;color:var(--txt3);font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.efr input,.efr select{font-size:12px;padding:7px 8px}
.efr button{padding:8px 11px;border-radius:8px;border:none;background:var(--ac);color:var(--acfg);font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0}
.evi{display:flex;align-items:center;gap:8px;padding:9px 11px;border-radius:9px;border:.5px solid var(--brd);margin-bottom:5px;background:var(--card)}
.evi.done-ev .et2{text-decoration:line-through;color:var(--txt4)}
.ei2{flex:1;min-width:0}
.et2{font-size:13px;color:var(--txt)}
.em2{font-size:11px;color:var(--txt3);margin-top:2px}
.ebdg{display:inline-block;font-size:10px;background:var(--bg3);color:var(--txt3);border-radius:3px;padding:1px 5px;margin-left:4px}
.etask{background:#fff3e0;color:#b07}.eev{background:#e8f4ff;color:#46a}
/* WEEK/DAY */
.wstrip{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:.8rem}
.wd{display:flex;flex-direction:column;align-items:center;padding:6px 2px;border-radius:9px;cursor:pointer;position:relative}
.wd:hover{background:var(--bg3)}.wd.sel{background:var(--ac)}
.wd.sel .wdn,.wd.sel .wdd{color:var(--acfg)}.wd.today .wdd{font-weight:700}
.wdn{font-size:10px;color:var(--txt4);margin-bottom:2px;font-weight:500}.wdd{font-size:14px;color:var(--txt)}
.wd.past .wdd{color:var(--txt4)}
.wd.dot::after{content:'';width:3px;height:3px;border-radius:50%;background:var(--ac);position:absolute;bottom:3px;opacity:.6}
.wd.sel.dot::after{background:var(--acfg)}.wd.hol .wdd{color:var(--hol)}
.dtl{display:flex;flex-direction:column;gap:5px}
.dti{display:flex;gap:9px;align-items:center;padding:9px 11px;border-radius:9px;border:.5px solid var(--brd);background:var(--card)}
.dtt{font-size:11px;color:var(--txt3);min-width:36px;flex-shrink:0}
.dtb2{flex:1;min-width:0}
.dttl{font-size:13px;color:var(--txt)}.dttl.done{text-decoration:line-through;color:var(--txt4)}
/* HABITS */
.hprog{background:var(--card);border-radius:13px;border:.5px solid var(--brd);padding:13px 14px;margin-bottom:.9rem;flex-shrink:0}
.hph{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.hph span{font-size:13px;color:var(--txt2);font-weight:500}
.pbw{background:var(--bg3);border-radius:99px;height:7px;overflow:hidden}
.pbf{height:100%;border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.pbm{font-size:12px;color:var(--txt3);margin-top:6px;text-align:center}
.hcard{background:var(--card);border-radius:13px;border:.5px solid var(--brd);margin-bottom:10px;overflow:hidden;flex-shrink:0;transition:transform .2s, opacity .2s, box-shadow .2s}
.hcard:active{transform:scale(.985)}
.hcbar{height:4px}.hcbody{padding:12px 14px}
.hctop{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.hico{font-size:20px;flex-shrink:0;line-height:1}
.hnm{flex:1;font-size:14px;font-weight:500;color:var(--txt);line-height:1.3}
.hcm{display:flex;align-items:center;gap:5px;flex-shrink:0}
.hstr{font-size:13px;color:var(--txt2);font-weight:600}
.hedit{background:none;border:none;cursor:pointer;font-size:12px;color:var(--txt4);padding:3px 4px}
.hdelbtn{background:none;border:.5px solid #e4444433;border-radius:6px;cursor:pointer;font-size:13px;padding:3px 7px;color:#e44;line-height:1}
.hbub{display:flex;gap:6px;flex-wrap:wrap;align-items:flex-end}
.bub{border-radius:50%;border:2.5px solid currentColor;cursor:pointer;transition:background .15s,transform .1s;flex-shrink:0}
.bub:active{transform:scale(.85)}
.bub:not(.filled){animation:pulse 2.8s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(84,160,255,0)}50%{box-shadow:0 0 0 5px rgba(84,160,255,.12)}}
.bub.filled{background:currentColor;animation:none}
.bsm{width:28px;height:28px}.blg{width:38px;height:38px}
.htl{font-size:9px;color:var(--txt4);text-align:center;margin-top:2px}
.hbwrap{display:flex;flex-direction:column;align-items:center;gap:1px}
.hpc{font-size:12px;color:var(--txt3);margin-left:4px}
.hct{font-size:12px;font-weight:500;margin-left:4px}
.huns{opacity:.5}.hnt{font-size:11px;color:var(--txt4);font-style:italic;margin-top:5px}
.bubtip{font-size:10px;color:var(--txt4);margin-left:4px;font-style:italic;align-self:center}
/* HABIT FORM */
.hff{margin-bottom:13px}
.hff label{display:block;font-size:11px;color:var(--txt3);font-weight:500;letter-spacing:.07em;text-transform:uppercase;margin-bottom:5px}
.hff input[type=text],.hff input[type=time],.hff select{width:100%}
.ecat-lbl{font-size:10px;color:var(--txt4);margin-bottom:4px;margin-top:8px;font-weight:600;letter-spacing:.04em}
.ecat-lbl:first-child{margin-top:0}
.emoji-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:2px}
.eopt{font-size:22px;cursor:pointer;padding:4px 5px;border-radius:7px;border:1.5px solid transparent;line-height:1;transition:transform .1s}
.eopt:hover{background:var(--bg3)}
.eopt.sel{border-color:var(--ac);background:var(--bg3);transform:scale(1.1)}
.csw-row{display:flex;gap:7px;flex-wrap:wrap}
.csw{width:29px;height:29px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform .1s}
.csw.sel{border-color:var(--txt);transform:scale(1.12)}
.frow{display:flex;gap:6px;flex-wrap:wrap}
.fbtn{padding:6px 12px;border-radius:99px;border:.5px solid var(--brd2);font-size:13px;cursor:pointer;background:var(--bg3);color:var(--txt2);font-family:inherit}
.fbtn.sel{background:var(--ac);color:var(--acfg);border-color:var(--ac)}
.drow{display:flex;gap:5px;margin-top:8px}
.dck{width:33px;height:33px;border-radius:50%;border:.5px solid var(--brd2);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;background:var(--bg3);color:var(--txt2);font-family:inherit;flex-shrink:0}
.dck.sel{background:var(--ac);color:var(--acfg)}
.tst{display:flex;align-items:center;gap:11px}
.tsb{width:32px;height:32px;border-radius:50%;border:.5px solid var(--brd2);background:var(--bg3);color:var(--txt);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;flex-shrink:0}
.tsv{font-size:18px;font-weight:500;color:var(--txt);min-width:18px;text-align:center}
.tsl{font-size:12px;color:var(--txt3)}
.htgrid{display:flex;flex-direction:column;gap:6px;margin-top:5px}
.htrow{display:flex;align-items:center;gap:9px;padding:6px 10px;background:var(--bg3);border-radius:8px}
.htrow span{font-size:12px;color:var(--txt2);flex-shrink:0;min-width:80px}
.htrow input{flex:1}
/* FOCUS */
.fbubs{display:flex;gap:9px;justify-content:center;flex-wrap:wrap;margin:12px 0 5px}
.fbub{width:40px;height:40px;border-radius:50%;border:2.5px solid currentColor;cursor:pointer;transition:background .15s}
.fbub:active{transform:scale(.88)}.fbub.filled{background:currentColor}
.fcnt{text-align:center;font-size:13px;color:var(--txt3);margin-bottom:12px}
.fsts{display:flex;justify-content:center;gap:22px;margin-bottom:10px}
.fs{text-align:center}
.fsn{font-size:22px;font-weight:500;color:var(--txt)}.fsl{font-size:11px;color:var(--txt3);margin-top:1px}
.fq{text-align:center;font-size:13px;color:var(--txt3);font-style:italic;padding:0 8px;margin:10px 0}
.hgs{margin:10px 0}
.hdow{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:3px}
.hdow span{text-align:center;font-size:10px;color:var(--txt4)}
.hgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.hcl{aspect-ratio:1;border-radius:4px;background:var(--bg3)}.hcl.done{opacity:.85}.hcl.today{box-shadow:0 0 0 1.5px var(--txt)}
.tmrsec{margin-top:12px;padding-top:12px;border-top:.5px solid var(--brd);text-align:center}
.topts{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:8px}
.topt{padding:6px 11px;border-radius:99px;border:.5px solid var(--brd2);font-size:12px;cursor:pointer;background:var(--bg3);color:var(--txt2);font-family:inherit}
.topt.sel{background:var(--ac);color:var(--acfg)}
.tcrow{display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:8px}
.tcrow input{width:68px;text-align:center;font-size:14px;padding:6px 8px}
.tdisp{font-size:44px;font-weight:200;color:var(--txt);letter-spacing:.04em;margin:4px 0 9px;font-variant-numeric:tabular-nums}
.tbtn{padding:10px 28px;border-radius:99px;border:none;background:var(--ac);color:var(--acfg);font-size:14px;cursor:pointer;font-family:inherit}
/* ACHIEVEMENTS */
.ach-stat{font-size:12px;color:var(--txt3);margin-bottom:12px;line-height:1.8}
.ach-stat strong{color:var(--txt)}
.ach-sec{margin-bottom:16px}
.ach-sec-ttl{font-size:12px;color:var(--txt3);font-weight:600;letter-spacing:.07em;text-transform:uppercase;margin-bottom:9px}
.ach-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.ach-card{display:flex;flex-direction:column;align-items:center;padding:13px 8px;border-radius:12px;border:.5px solid var(--brd);background:var(--card);text-align:center}
.ach-card.locked{opacity:.32;filter:grayscale(1)}
.ach-ico{font-size:28px;margin-bottom:5px;line-height:1}
.ach-ttl{font-size:11px;font-weight:500;color:var(--txt);line-height:1.3;margin-bottom:2px}
.ach-dsc{font-size:10px;color:var(--txt3);line-height:1.3}
/* SUGGESTIONS */
.sug-grid{display:flex;flex-direction:column;gap:7px}
.sug-item{display:flex;align-items:center;gap:10px;padding:11px 13px;border-radius:10px;border:.5px solid var(--brd);background:var(--card)}
.sug-ico{font-size:22px;flex-shrink:0}
.sug-info{flex:1;min-width:0}
.sug-nm{font-size:13px;font-weight:500;color:var(--txt)}
.sug-dt{font-size:11px;color:var(--txt3);margin-top:1px}
.sug-add{background:var(--ac);color:var(--acfg);border:none;border-radius:7px;padding:6px 12px;font-size:12px;cursor:pointer;font-family:inherit;flex-shrink:0}
/* TUTORIAL */
#tut{position:fixed;inset:0;z-index:200;display:flex;align-items:flex-end;justify-content:center;padding:0 1rem 1rem}
#tut-bg{position:absolute;inset:0;background:rgba(0,0,0,.55)}
.tut-card{position:relative;background:var(--bg2);border-radius:18px;padding:22px;width:100%;max-width:460px;z-index:1}
.tut-ico{font-size:38px;text-align:center;margin-bottom:9px}
.tut-ttl{font-size:17px;font-weight:600;color:var(--txt);text-align:center;margin-bottom:7px}
.tut-txt{font-size:13px;color:var(--txt2);text-align:center;line-height:1.65;margin-bottom:16px}
.tut-dots{display:flex;justify-content:center;gap:5px;margin-bottom:14px}
.tut-dot{width:6px;height:6px;border-radius:50%;background:var(--brd2);transition:all .2s}
.tut-dot.active{background:var(--ac);width:20px;border-radius:3px}
.tut-row{display:flex;gap:9px}
.tut-skip{flex:1;padding:11px;border-radius:10px;border:.5px solid var(--brd2);background:transparent;color:var(--txt3);cursor:pointer;font-family:inherit;font-size:13px}
.tut-next{flex:2;padding:11px;border-radius:10px;border:none;background:var(--ac);color:var(--acfg);cursor:pointer;font-family:inherit;font-size:13px;font-weight:500}
/* FINANCES */
.f-card{background:var(--card);border-radius:13px;border:.5px solid var(--brd);padding:13px;margin-bottom:1rem;flex-shrink:0}
.f-bal{display:flex;justify-content:space-between;align-items:flex-start}
.f-v{font-size:26px;font-weight:600;color:var(--txt);margin-top:2px}
.acc-list{margin-top:10px;display:flex;flex-direction:column;gap:5px}
.acc-it{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:var(--bg3);border-radius:8px;font-size:13px;color:var(--txt)}
.acc-nm{font-weight:500;display:flex;align-items:center;gap:5px}
.acc-val{color:var(--txt2)}
.cat-it{display:flex;justify-content:space-between;padding:6px 0;border-bottom:.5px solid var(--brd2);font-size:13px;color:var(--txt)}
.cat-it:last-child{border-bottom:none}
</style>
</head>

const ck=(y,m,d)=>`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
const fmtC=v=>Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
function fmtDt(dk,dt){if(!dk)return'';const[y,m,d]=dk.split('-').map(Number);const s=new Date(y,m-1,d).toLocaleDateString('pt-BR',{day:'numeric',month:'short'});return dt?`${s} · ${dt}`:s;}
function isOv(dk,dt){if(!dk)return false;const[y,m,d]=dk.split('-').map(Number);if(dt){const[h,mi]=dt.split(':').map(Number);return new Date(y,m-1,d,h,mi)<NOW;}return new Date(y,m-1,d,23,59)<NOW;}

// HOLIDAYS
function getEaster(y){const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),mo=Math.floor((h+l-7*m+114)/31),day=((h+l-7*m+114)%31)+1;return new Date(y,mo-1,day);}
const HC={};
function ensureHols(y){if(HC[y])return HC[y];const h={};[[1,1,'Confraternização'],[4,21,'Tiradentes'],[5,1,'Dia do Trabalho'],[9,7,'Independência'],[10,12,'N.Sra.Aparecida'],[11,2,'Finados'],[11,15,'República'],[11,20,'Consciência Negra'],[12,25,'Natal']].forEach(([m,d,n])=>h[`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`]=n);const e=getEaster(y);h[getDK(addDays(e,-48))]='Carnaval';h[getDK(addDays(e,-47))]='Carnaval';h[getDK(addDays(e,-2))]='Sexta-feira Santa';h[getDK(e)]='Páscoa';h[getDK(addDays(e,60))]='Corpus Christi';HC[y]=h;return h;}
function getHol(y,m,d){return ensureHols(y)[ck(y,m,d)]||null;}

if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
function updN(){
  const st=document.getElementById('nst'),btn=document.getElementById('nbtn');
  if(typeof Notification === 'undefined'){
    st.textContent='Não suportado';st.className='ns off';btn.style.display='none';
    return;
  }
  const p=Notification.permission;st.className='ns '+(p==='granted'?'on':'off');
  if(p==='granted'){st.textContent='● Ativas';btn.textContent='Info';btn.onclick=()=>alert('Desative em Configurações do Chrome → Notificações.');}
  else if(p==='denied'){st.textContent='● Bloqueadas';btn.textContent='Ativar';btn.onclick=()=>alert('Vá em Configurações do Chrome → Notificações.');}
  else{st.textContent='● Inativas';btn.textContent='Ativar';btn.onclick=reqN;}
}
function reqN(){
  if(typeof Notification === 'undefined')return;
  Notification.requestPermission().then(p=>{
     updN();
     if(p==='granted'){schedAll();toast('Notificações ativadas ✓');}
  });
}

let fbT=[];
async function schedN(title,body,delay,tag){
  if(delay<=0)return;
  try{const r=await navigator.serviceWorker.ready;if(r.active){r.active.postMessage({type:'NOTIFY',title,body,delay,tag});return;}}catch(e){}
  fbT.push(setTimeout(()=>{if(Notification.permission==='granted')new Notification(title,{body});},delay));
}
function schedAll(){
  fbT.forEach(t=>clearTimeout(t));fbT=[];
  if(typeof Notification === 'undefined' || Notification.permission!=='granted')return;
  navigator.serviceWorker.ready.then(r=>{if(r.active)r.active.postMessage({type:'CLEAR_ALL'});}).catch(()=>{});
  const nl=n=>n>=60?`${n/60}h`:`${n}min`;
  tasks.filter(t=>!t.done&&t.dk&&t.dt&&t.nb).forEach(t=>{const[y,m,d]=t.dk.split('-').map(Number);const[h,mi]=t.dt.split(':').map(Number);const delay=new Date(y,m-1,d,h,mi).getTime()-t.nb*60000-Date.now();if(delay>0)schedN('Meu Organizador',`✅ "${t.text}" — faltam ${nl(t.nb)}`,delay,`t-${t.id}`);});
  Object.keys(events).forEach(key=>{const[y,m,d]=key.split('-').map(Number);(events[key]||[]).forEach(ev=>{if(!ev.time||!ev.nb)return;const[h,mi]=ev.time.split(':').map(Number);const delay=new Date(y,m-1,d,h,mi).getTime()-ev.nb*60000-Date.now();if(delay>0)schedN('Meu Organizador',`📅 "${ev.text}" às ${ev.time} — faltam ${nl(ev.nb)}`,delay,`e-${ev.id}`);});});
  
  if(cfg.nHab !== false) {
    habits.forEach(h=>{
      if(!isSchedOn(h,new Date()))return;
      if(h.times&&h.times.length){
        const cnt=getHabCnt(h);
        h.times.forEach((t,i)=>{if(!t||i<cnt)return;const[hh,mm]=t.split(':').map(Number);const at=new Date();at.setHours(hh,mm,0,0);const delay=at-Date.now();if(delay>0)schedN('Meu Organizador',`${h.icon} ${h.name} — ocorrência ${i+1}!`,delay,`hab-${h.id}-${i}`);});
      }else if(h.reminderTime){
        const[hh,mm]=h.reminderTime.split(':').map(Number);const at=new Date();at.setHours(hh,mm,0,0);const delay=at-Date.now();if(delay>0)schedN('Meu Organizador',`${h.icon} ${h.name} — não esqueça! 🔥`,delay,`hab-${h.id}`);
      }
    });
  }
}

function renderTasks(){

// TOUCH DRAG & DROP FOR ALL
function bindDrag(containerId, itemClass, onReorder) {
    const g = document.getElementById(containerId);
    if(!g) return;
    let dTimer=null, dEl=null, sx=0, sy=0;

    g.addEventListener('touchstart', e => {
        const t = e.target.closest(itemClass);
        if(!t || e.target.closest('button') || e.target.closest('.bub')) return;
        sx = e.touches[0].clientX; sy = e.touches[0].clientY;
        dTimer = setTimeout(() => {
            dEl = t; dEl.classList.add('dragging');
            dEl.style.opacity = '0.5'; dEl.style.transform = 'scale(0.95)'; dEl.style.transition = 'none';
            if(navigator.vibrate) navigator.vibrate(50);
        }, 500); 
    }, {passive:true});

    g.addEventListener('touchmove', e => {
        if(!dEl && dTimer) { if(Math.abs(e.touches[0].clientX - sx)>15 || Math.abs(e.touches[0].clientY - sy)>15) { clearTimeout(dTimer); dTimer=null; } }
        if(dEl) {
            e.preventDefault();
            const y = e.touches[0].clientY;
            const els = [...g.querySelectorAll(`${itemClass}:not(.dragging)`)];
            const afterEl = els.find(el => y <= el.getBoundingClientRect().top + el.getBoundingClientRect().height / 2);
            if(afterEl) { if(dEl.nextSibling !== afterEl) g.insertBefore(dEl, afterEl); } 
            else { if(g.lastChild !== dEl) g.appendChild(dEl); }
        }
    }, {passive:false});

    const endDrag = () => {
        if(dTimer) { clearTimeout(dTimer); dTimer=null; }
        if(dEl) {
            dEl.classList.remove('dragging');
            dEl.style.opacity = ''; dEl.style.transform = ''; dEl.style.transition = '';
            dEl = null; onReorder();
        }
    };
    g.addEventListener('touchend', endDrag); g.addEventListener('touchcancel', endDrag);
}

        toast(`⏱ ${focusH?focusH.icon:''} Tempo concluído!`);
        if(navigator.vibrate) navigator.vibrate([500, 200, 500]);
        if(typeof Notification !== 'undefined' && Notification.permission==='granted')new Notification('Meu Organizador',{body:`⏱ Timer concluído: ${focusH?focusH.icon+' '+focusH.name:''}`});
      }
    },1000);
    const b=document.getElementById('t-btn');if(b)b.textContent='Pausar';
  }
}
function fmtTimer(s){return`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;}

// FINANCES
function chgBillType(){
  const t = document.getElementById('bill-type').value;
  document.getElementById('lbl-bill-date').textContent = t === '+' ? 'Entrada' : 'Vencimento';
  document.getElementById('bill-cat').innerHTML = (t === '+' ? CATS_IN : CATS_OUT).map(c => `<option value="${c}">${c}</option>`).join('');
}
function expandMonth(k, name) {
  const b = bills.filter(x => x.date && x.date.startsWith(k));
  const el = document.getElementById('fin-proj-details');
  if(!b.length) {
      el.style.display = 'block';
      el.innerHTML = `<div style="font-size:13px;font-weight:600;color:var(--txt);margin-bottom:6px">Resumo de ${name}</div><p style="font-size:12px;color:var(--txt3)">Nenhum lançamento previsto.</p>`;
      return;
  }
  let html = `<div style="font-size:13px;font-weight:600;color:var(--txt);margin-bottom:8px">Resumo de ${name}</div>`;
  const cats = {};
  b.forEach(x => {
      const key = x.cat || 'Outro';
      if(!cats[key]) cats[key] = {in:0, out:0};
      if(x.type === '+') cats[key].in += Number(x.val); else cats[key].out += Number(x.val);
  });
  for(let c in cats) {
      if(cats[c].in > 0) html += `<div class="cat-it"><span>${c}</span><span style="color:#2e7d32">+${fmtC(cats[c].in)}</span></div>`;
      if(cats[c].out > 0) html += `<div class="cat-it"><span>${c}</span><span style="color:#e44">-${fmtC(cats[c].out)}</span></div>`;
  }
  el.style.display = 'block'; el.innerHTML = html;
}
function renderFin(){
  const totalBal = accounts.reduce((acc, curr) => acc + Number(curr.val), 0);
  document.getElementById('fin-total').textContent = fmtC(totalBal);
  
  let projHtml = '';
  let runBal = totalBal;
  const now = new Date();
  for(let i=0; i<6; i++) {
      let mDate = new Date(now.getFullYear(), now.getMonth() + i, 1);
      let y = mDate.getFullYear(), m = mDate.getMonth();
      let k = `${y}-${String(m+1).padStart(2,'0')}`;
      let inM=0, outM=0;
      bills.forEach(b => {
          if(!b.paid && b.date && b.date.startsWith(k)) { if(b.type === '+') inM += Number(b.val||0); else outM += Number(b.val||0); }
      });
      runBal = runBal + inM - outM;
      projHtml += `<div onclick="expandMonth('${k}', '${MO[m]}/${y}')" style="min-width:125px; padding:10px; cursor:pointer; background:var(--bg3); border:.5px solid var(--brd2); border-radius:10px; flex-shrink:0;">
         <div style="font-size:11px; color:var(--txt3); font-weight:600; text-transform:uppercase">${MO[m].substring(0,3)}/${y}</div>
         <div style="font-size:14px; font-weight:600; color:${runBal<0?'#e44':'var(--txt)'}; margin-top:4px">${fmtC(runBal)}</div>
         <div style="display:flex; justify-content:space-between; margin-top:6px; font-size:10px;">
           <span style="color:#2e7d32">↑ ${fmtC(inM)}</span> <span style="color:#e44">↓ ${fmtC(outM)}</span>
         </div>
      </div>`;
  }
  document.getElementById('fin-proj').innerHTML = projHtml;

  const accList = document.getElementById('acc-list');
  accList.innerHTML = accounts.map(a => `
    <div class="acc-it">
       <span class="acc-nm"><button class="bd" style="font-size:14px;color:#e44" onclick="delAccount(${a.id})">×</button> ${esc(a.name)}</span>
       <div style="display:flex;gap:8px;align-items:center">
          <span class="acc-val">${fmtC(a.val)}</span>
          <button class="bd" style="font-size:12px;color:var(--txt3)" onclick="editAccount(${a.id})">✏️</button>
       </div>
    </div>
  `).join('');

  const list = document.getElementById('bill-list');
  const sortedBills = [...bills].sort((a,b) => (a.date||'').localeCompare(b.date||''));
  list.innerHTML = sortedBills.map(b => {
    const cEmoji=b.cat?b.cat.split(' ')[0]:'';
    return `<div class="ti ${b.paid?'done-item':''}">
      <div class="tck ${b.paid?'done':''}" onclick="togBill(${b.id})">${b.paid?`<svg width="9" height="7" viewBox="0 0 9 7" fill="none"><path d="M1 3.5l2.5 2.5 4.5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`:''}</div>
      <div class="tb2"><div class="tt">${cEmoji} ${esc(b.desc)} <span class="ebdg" style="background:${b.type==='+'?'#e8f5e9':'#ffebee'};color:${b.type==='+'?'#2e7d32':'#c62828'}">${b.type==='+'?'entrada':'conta'}</span></div><div class="tm">📅 ${fmtDt(b.date)} ${b.val ? ` · ${fmtC(b.val)}` : ''}</div></div>
      <button class="bd" style="font-size:13px;margin-right:6px" onclick="editBill(${b.id})">✏️</button>
      <button class="bd" onclick="delBill(${b.id})">×</button>
    </div>`;
  }).join('') || '<p class="empty" style="margin-top:1rem">Nenhum lançamento.</p>';
}

function addAccount(){
  const nm = prompt("Nome da Carteira/Banco:");
  if(!nm || !nm.trim()) return;
  const vl = prompt(`Saldo inicial para '${nm}' (use ponto para centavos):`, "0.00");
  if(vl !== null && !isNaN(parseFloat(vl.replace(',','.')))) { accounts.push({id:Date.now(), name:nm.trim(), val:parseFloat(vl.replace(',','.'))}); save(); renderFin(); }
}
function editAccount(id){
  const acc = accounts.find(a => a.id === id); if(!acc) return;
  const nv = prompt(`Novo saldo para '${acc.name}':`, acc.val);
  if(nv !== null && !isNaN(parseFloat(nv.replace(',','.')))) { acc.val = parseFloat(nv.replace(',','.')); save(); renderFin(); }
}
function delAccount(id){ if(confirm("Remover esta carteira permanentemente?")) { accounts = accounts.filter(a => a.id !== id); save(); renderFin(); } }

function addBill(){
  const desc = document.getElementById('bill-desc').value.trim(); if(!desc) return;
  const type = document.getElementById('bill-type').value, cat = document.getElementById('bill-cat').value, date = document.getElementById('bill-date').value, val = document.getElementById('bill-val').value;
  bills.push({id: Date.now(), type, cat, desc, date, val, paid: false});
  document.getElementById('bill-desc').value=''; document.getElementById('bill-date').value=''; document.getElementById('bill-val').value='';
  save(); renderFin(); renderCal();
}
function editBill(id){
  const b = bills.find(x => x.id === id); if(!b) return;
  const ndesc = prompt("Nova descrição:", b.desc); if(ndesc === null) return;
  const nval = prompt("Novo valor (use ponto para centavos):", b.val); if(nval === null) return;
  const ndate = prompt("Nova data (YYYY-MM-DD):", b.date); if(ndate === null) return;
  b.desc = ndesc.trim() || b.desc; b.val = parseFloat(nval.replace(',','.')) || b.val; b.date = ndate || b.date;
  save(); renderFin(); renderEvList(); renderCal();
}
function togBill(id){ bills = bills.map(b => b.id === id ? {...b, paid: !b.paid} : b); save(); renderFin(); renderEvList(); renderCal(); }
function delBill(id){ if(confirm('Excluir este lançamento permanentemente?')){ bills = bills.filter(b => b.id !== id); save(); renderFin(); renderEvList(); renderCal(); } }

// ACHIEVEMENTS & SUGGESTIONS
function openAch(){
  const body=document.getElementById('ach-body');
  const tDn=tasks.filter(t=>t.done).length, eDn=Object.values(events).flat().filter(e=>e.done).length, hDn=Object.values(habits.map(h=>Object.values(h.history||{})).flat()).filter(v=>v>0).length;
  const totalDn=tDn+eDn+hDn;
  let maxStr=0; habits.forEach(h=>{const s=compStreak(h);if(s>maxStr)maxStr=s;});
  
  let html=`<div class="ach-stat">Você já completou <strong>${totalDn}</strong> itens no total e sua maior sequência atual é de <strong>${maxStr}</strong> dias. Continue assim!</div><div class="ach-grid">`;
  
  BADGE_DEFS.forEach(b=>{
    let unlocked = false;
    if(b.id.startsWith('s')) unlocked = maxStr >= parseInt(b.id.substring(1));
    else if(b.id.startsWith('t')) unlocked = totalDn >= parseInt(b.id.substring(1));
    else if(b.id==='first') unlocked = habits.length > 0;
    html+=`<div class="ach-card ${unlocked?'':'locked'}"><div class="ach-ico">${b.icon}</div><div class="ach-ttl">${b.title}</div><div class="ach-dsc">${b.desc}</div></div>`;
  });
  body.innerHTML=html+'</div>';
  document.getElementById('mo-ach').classList.add('open');
}

function openSug(){
  const body=document.getElementById('sug-body');
  body.innerHTML=`<div class="sug-grid">` + HABIT_SUGS.map((s,i)=>`<div class="sug-item"><div class="sug-ico">${s.icon}</div><div class="sug-info"><div class="sug-nm">${s.name}</div><div class="sug-dt">${s.desc}</div></div><button class="sug-add" onclick="addSug(${i})">Adicionar</button></div>`).join('') + `</div>`;
  document.getElementById('mo-sug').classList.add('open');
}
function addSug(i){
  const s=HABIT_SUGS[i];
  habits.push({id:Date.now(), icon:s.icon, name:s.name, target:s.target, frequency:s.frequency, color:s.color, customDays:s.customDays||[], times:[], history:{}});
  saveHabits(); renderHabits(); document.getElementById('mo-sug').classList.remove('open'); toast('Hábito adicionado!');
}

// TUTORIAL
function startTutorial(){
    if(localStorage.getItem('o_tut_done')) return;
    setTimeout(()=>{
        const n = prompt("👋 Bem-vindo ao seu Organizador!\nComo você se chama?");
        if(n && n.trim()){ cfg.name = n.trim(); saveCfg(); applyName(); }
        tutStep=0; document.getElementById('tut').style.display='flex'; showStep();
    }, 150);
}
function showStep(){const s=TUT_STEPS[tutStep];document.getElementById('tut-ico').textContent=s.ico;document.getElementById('tut-ttl').textContent=s.ttl;document.getElementById('tut-txt').textContent=s.txt;let d='';TUT_STEPS.forEach((_,i)=>d+=`<div class="tut-dot ${i===tutStep?'active':''}"></div>`);document.getElementById('tut-dots').innerHTML=d;document.getElementById('tut-next').textContent=tutStep===TUT_STEPS.length-1?'Começar!':'Próximo →';if(s.tab)swTab(s.tab,document.getElementById('tb-'+s.tab));}
function nextTut(){if(tutStep<TUT_STEPS.length-1){tutStep++;showStep();}else endTutorial();}
function endTutorial(){
    document.getElementById('tut').style.display='none';
    localStorage.setItem('o_tut_done','true');
    setTimeout(() => {
        if(typeof Notification !== 'undefined' && Notification.permission === 'default') {
            if(confirm("Deseja ativar as notificações para ser lembrado das suas tarefas e hábitos?")) { reqN(); }
        }
    }, 400);
}

// ── INIT BLINDADO ──
window.onload = () => {
    // 1. Carrega os dados silenciosamente
    load(); loadCfg(); loadHabits();
    
    // 2. Aplica as customizações do usuário
    applyTheme(); applyName();
    
    // 3. Processa URLs compartilhadas (sem atrapalhar o fluxo principal)
    try {
        const p = new URLSearchParams(location.search);
        const txt = (p.get('text') || p.get('url') || '').trim();
        if (txt) {
            notes.unshift({ id: Date.now(), title: p.get('title') || 'Compartilhado', body: txt, date: NOW.toLocaleDateString('pt-BR') });
            save(); history.replaceState(null, '', location.pathname); window._shared = true;
        }
    } catch(e) {}

    // 4. Prepara o motor visual
    chgBillType(); 
    ensureHols(TY); ensureHols(TY+1);

    // 5. Renderiza TODAS as abas para a memória (Resolve o problema de itens sumindo)
    renderTasks();
    renderNotes();
    renderHabits();
    renderFin();
    
    // 6. Força a tela inicial ser a Agenda focado no dia de hoje
    swTab('agenda', document.getElementById('tb-agenda'));
    selDay(TD); 

    // 7. Ativa as interações (Teclado e Arrastar)
    bindDrag('ngrid', '.nc', () => {
        const arr=[]; document.querySelectorAll('#ngrid .nc').forEach(el=>arr.push(notes.find(n=>n.id===Number(el.dataset.id))));
        notes=arr.filter(Boolean); save();
    });
    bindDrag('hab-list', '.hcard', () => {
        const arr=[]; document.querySelectorAll('#hab-list .hcard').forEach(el=>arr.push(habits.find(h=>h.id===Number(el.dataset.id))));
        habits=arr.filter(Boolean); saveHabits();
    });
    
    document.getElementById('task-in').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });
    document.getElementById('ev-in').addEventListener('keydown', e => { if (e.key === 'Enter') addEvent(); });

    if (window._shared) { swTab('notes', document.getElementById('tb-notes')); toast('✓ Texto salvo nas notas!'); }

    document.addEventListener('visibilitychange', () => { if (!document.hidden) schedAll(); });
    
    // 8. Só depois que a tela toda estiver desenhada, ele aciona os alarmes e o tutorial (Evita bloqueios)
    setTimeout(() => {
        schedAll();
        startTutorial();
    }, 300);
}
</script>
