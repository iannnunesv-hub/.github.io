
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
<meta name="theme-color" content="#fff"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<link rel="manifest" href="./manifest.json"/>
<title>Meu Organizador</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fafafa;--bg2:#fff;--bg3:#f5f5f5;--bg4:#ececec;--brd:#eee;--brd2:#ddd;--txt:#222;--txt2:#666;--txt3:#aaa;--txt4:#ccc;--ac:#222;--acfg:#fff;--card:#fff;--inp:#fff;--hol:#e05;}
[data-theme=dark]{--bg:#111;--bg2:#1a1a1a;--bg3:#222;--bg4:#0d0d0d;--brd:#2a2a2a;--brd2:#333;--txt:#eee;--txt2:#aaa;--txt3:#666;--txt4:#444;--ac:#e0e0e0;--acfg:#111;--card:#1e1e1e;--inp:#252525;--hol:#ff6b8a;}
body{font-family:system-ui,sans-serif;background:var(--bg4);display:flex;justify-content:center;min-height:100vh;padding:.5rem;transition:background .2s}
#app{width:100%;max-width:480px;background:var(--bg);border-radius:16px;border:.5px solid var(--brd);overflow:hidden;display:flex;flex-direction:column;min-height:97vh}
.hdr{background:var(--bg2);border-bottom:.5px solid var(--brd);padding:12px 15px 10px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.hdr h1{font-size:17px;font-weight:500;color:var(--txt)}
.hdr p{font-size:11px;color:var(--txt3);margin-top:1px}
.gear-btn{background:none;border:.5px solid var(--brd2);border-radius:8px;padding:6px;cursor:pointer;display:flex;align-items:center;color:var(--txt2)}
.cnt{flex:1;overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column}
.sec{display:none;padding:1rem;flex:1;flex-direction:column}
.sec.active{display:flex}
.tabbar{display:flex;border-top:.5px solid var(--brd);background:var(--bg2);flex-shrink:0}
.tb{flex:1;padding:9px 2px 7px;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--txt4);font-size:10px;font-family:inherit}
.tb.active{color:var(--txt);font-weight:500}
.tb svg{width:16px;height:16px}
input,textarea,select{padding:7px 10px;border-radius:8px;border:.5px solid var(--brd2);font-size:13px;outline:none;font-family:inherit;background:var(--inp);color:var(--txt)}
textarea{resize:none;line-height:1.6;width:100%}
.ib{padding:8px 13px;border-radius:8px;border:none;background:var(--ac);color:var(--acfg);font-size:16px;cursor:pointer;flex-shrink:0}
.bd{background:none;border:none;cursor:pointer;color:var(--txt4);font-size:15px;padding:0 3px;flex-shrink:0}
.lbl{font-size:10px;color:var(--txt3);margin-bottom:4px;font-weight:500;letter-spacing:.07em;text-transform:uppercase}
.empty{text-align:center;color:var(--txt4);font-size:13px;margin-top:2rem}
.bbk{background:none;border:.5px solid var(--brd2);border-radius:8px;padding:6px 10px;cursor:pointer;font-size:12px;color:var(--txt2);font-family:inherit}
.bsv{background:var(--ac);color:var(--acfg);border:none;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;font-family:inherit}
/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.mo.open{opacity:1;pointer-events:all}
.md{background:var(--bg2);border-radius:18px 18px 0 0;width:100%;max-width:480px;max-height:90vh;display:flex;flex-direction:column;transform:translateY(30px);transition:transform .25s}
.mo.open .md{transform:translateY(0)}
.mh{display:flex;justify-content:space-between;align-items:center;padding:14px 17px 11px;border-bottom:.5px solid var(--brd);flex-shrink:0}
.mh h2{font-size:14px;font-weight:500;color:var(--txt)}
.mc{background:none;border:none;font-size:21px;cursor:pointer;color:var(--txt3);line-height:1}
.mb{overflow-y:auto;flex:1;padding:13px 17px}
.mf{padding:10px 17px 18px;flex-shrink:0;border-top:.5px solid var(--brd)}
/* SETTINGS */
.cst{font-size:10px;color:var(--txt3);font-weight:500;letter-spacing:.08em;text-transform:uppercase;margin:14px 0 8px}
.cst:first-child{margin-top:0}
.cr{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:.5px solid var(--brd)}
.cr:last-child{border-bottom:none}
.cl{font-size:13px;color:var(--txt)}
.tog{position:relative;width:41px;height:22px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0;position:absolute}
.tog-s{position:absolute;inset:0;background:var(--brd2);border-radius:24px;cursor:pointer;transition:background .2s}
.tog-s::before{content:'';position:absolute;width:16px;height:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:transform .2s}
.tog input:checked+.tog-s{background:#555}
.tog input:checked+.tog-s::before{transform:translateX(19px)}
.ns{font-size:11px;font-weight:500}.ns.on{color:#3a3}.ns.off{color:var(--txt3)}
.bncfg{background:var(--ac);color:var(--acfg);border:none;border-radius:7px;padding:5px 10px;font-size:11px;cursor:pointer;font-family:inherit}
/* TASKS */
.tf{background:var(--card);border-radius:11px;border:.5px solid var(--brd);padding:11px;margin-bottom:.9rem;flex-shrink:0}
.tftop{display:flex;gap:6px;margin-bottom:9px}
.tftop input{flex:1}
.tf2{display:flex;gap:5px;flex-wrap:wrap}
.tff{display:flex;flex-direction:column;gap:3px;flex:1;min-width:70px}
.tff label{font-size:9px;color:var(--txt3);font-weight:500;letter-spacing:.06em;text-transform:uppercase}
.tff input,.tff select{font-size:11px;padding:6px 7px}
.ti{display:flex;align-items:flex-start;gap:8px;padding:9px 11px;border-radius:9px;border:.5px solid var(--brd);margin-bottom:5px;background:var(--card)}
.tck{width:17px;height:17px;border-radius:50%;border:1.5px solid var(--txt4);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .15s}
.tck.done{background:var(--ac);border-color:var(--ac)}
.tb2{flex:1;min-width:0}
.tt{font-size:13px;color:var(--txt);line-height:1.4}
.tt.done{color:var(--txt4);text-decoration:line-through}
.tm{font-size:10px;color:var(--txt3);margin-top:2px}
.tm.ov{color:#e44}
.dtb{display:flex;gap:0;flex-shrink:0}
.brev{background:none;border:none;cursor:pointer;font-size:13px;padding:2px 4px;color:var(--txt3)}
.bperm{background:none;border:none;cursor:pointer;font-size:13px;padding:2px 4px;color:#e44}
.dtoggle{width:100%;padding:8px 12px;border-radius:9px;border:.5px solid var(--brd);background:var(--card);text-align:left;color:var(--txt3);font-size:12px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;margin-top:.8rem;flex-shrink:0}
.dtoggle .arr{margin-left:auto;transition:transform .2s;font-size:13px}
.dtoggle.open .arr{transform:rotate(90deg)}
/* NOTES */
.ng{display:grid;grid-template-columns:1fr 1fr;gap:8px;flex:1;align-content:start;overflow-y:auto}
.nc{border-radius:10px;border:.5px solid var(--brd);padding:11px;cursor:pointer;background:var(--card);height:fit-content}
.nc h3{font-size:13px;font-weight:500;color:var(--txt);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nc p{font-size:11px;color:var(--txt3);margin-bottom:7px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.nf{display:flex;justify-content:space-between;align-items:center}
.nd{font-size:10px;color:var(--txt4)}
.bnn{width:100%;padding:9px;border-radius:9px;border:.5px dashed var(--brd2);background:transparent;font-size:13px;color:var(--txt3);cursor:pointer;margin-bottom:.9rem;font-family:inherit;flex-shrink:0}
#nlv{flex:1;display:flex;flex-direction:column;min-height:0}
.neh{display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem;flex-shrink:0}
#nt-ttl{border:none;outline:none;font-size:17px;font-weight:500;color:var(--txt);padding:0;margin-bottom:.5rem;border-radius:0;width:100%;background:transparent;flex-shrink:0}
#nt-bdy{border:none;outline:none;font-size:13px;color:var(--txt2);padding:0;border-radius:0;background:transparent;flex:1;min-height:calc(100svh - 250px)}
#nev{flex:1;display:none;flex-direction:column;min-height:0}
#nev.open{display:flex}
/* CALENDAR */
.vrow{display:flex;gap:5px;margin-bottom:.7rem;flex-shrink:0}
.vbtn{flex:1;padding:6px;border-radius:7px;border:.5px solid var(--brd2);background:var(--bg3);color:var(--txt2);font-size:11px;cursor:pointer;font-family:inherit}
.vbtn.sel{background:var(--ac);color:var(--acfg);border-color:var(--ac)}
.srow{display:flex;gap:6px;margin-bottom:.7rem;flex-shrink:0}
.srow input{flex:1;font-size:12px}
.sri{padding:7px 10px;border-radius:8px;border:.5px solid var(--brd);margin-bottom:4px;background:var(--card);cursor:pointer}
.sri-t{font-size:12px;color:var(--txt)}
.sri-m{font-size:10px;color:var(--txt3);margin-top:1px}
.cnr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.7rem}
.cnr span{font-size:13px;font-weight:500;color:var(--txt)}
.cnv{background:none;border:none;font-size:16px;cursor:pointer;color:var(--txt3);padding:3px 6px}
.cdow{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;margin-bottom:2px}
.cdow span{text-align:center;font-size:9px;color:var(--txt4);font-weight:500}
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px}
.cc{height:33px;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:6px;cursor:pointer;position:relative;font-size:12px;color:var(--txt)}
.cc:hover{background:var(--bg3)}
.cc.past{color:var(--txt4)}
.cc.today{background:var(--bg3);font-weight:600}
.cc.sel{background:var(--ac)!important;color:var(--acfg)!important}
.cc.dot::after{content:'';width:3px;height:3px;border-radius:50%;background:currentColor;position:absolute;bottom:3px;opacity:.5}
.cc.sel.dot::after{background:var(--acfg);opacity:.8}
.cc.emp{cursor:default}.cc.emp:hover{background:transparent}
.cc.hol{color:var(--hol)}.cc.sel.hol{color:var(--acfg)}
.evs{margin-top:.7rem;border-top:.5px solid var(--brd);padding-top:.7rem;flex-shrink:0}
.edl{font-size:11px;color:var(--txt3);margin-bottom:7px}
.holbanner{background:rgba(200,0,50,.08);border:.5px solid rgba(200,0,50,.2);border-radius:7px;padding:5px 9px;margin-bottom:7px;font-size:11px;color:var(--hol);display:flex;align-items:center;gap:5px}
.ef{display:flex;flex-direction:column;gap:5px;margin-bottom:.7rem}
.efr{display:flex;gap:5px}
.efr input,.efr select{flex:1;font-size:11px;padding:6px 7px}
.efr button{padding:6px 9px;border-radius:7px;border:none;background:var(--ac);color:var(--acfg);font-size:11px;cursor:pointer;font-family:inherit;white-space:nowrap}
.evi{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:8px;border:.5px solid var(--brd);margin-bottom:4px;background:var(--card)}
.evi.done-ev .et2{text-decoration:line-through;color:var(--txt4)}
.ei2{flex:1;min-width:0}
.et2{font-size:12px;color:var(--txt)}
.em2{font-size:10px;color:var(--txt3);margin-top:1px}
.ebdg{display:inline-block;font-size:9px;background:var(--bg3);color:var(--txt3);border-radius:3px;padding:1px 4px;margin-left:3px}
.etask{background:#fff3e0;color:#b07}
.eev{background:#e8f4ff;color:#46a}
/* WEEK/DAY */
.wstrip{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:.7rem}
.wd{display:flex;flex-direction:column;align-items:center;padding:5px 2px;border-radius:8px;cursor:pointer;position:relative}
.wd:hover{background:var(--bg3)}
.wd.sel{background:var(--ac)}
.wd.sel .wdn,.wd.sel .wdd{color:var(--acfg)}
.wd.today .wdd{font-weight:700}
.wdn{font-size:9px;color:var(--txt4);margin-bottom:2px;font-weight:500}
.wdd{font-size:13px;color:var(--txt)}
.wd.past .wdd{color:var(--txt4)}
.wd.dot::after{content:'';width:3px;height:3px;border-radius:50%;background:var(--ac);position:absolute;bottom:3px;opacity:.6}
.wd.sel.dot::after{background:var(--acfg)}
.wd.hol .wdd{color:var(--hol)}
.dtl{display:flex;flex-direction:column;gap:4px}
.dti{display:flex;gap:8px;align-items:flex-start;padding:7px 9px;border-radius:8px;border:.5px solid var(--brd);background:var(--card)}
.dtt{font-size:11px;color:var(--txt3);min-width:34px;flex-shrink:0;margin-top:1px}
.dtb2{flex:1;min-width:0}
.dttl{font-size:12px;color:var(--txt)}
.dttl.done{text-decoration:line-through;color:var(--txt4)}
/* HABITS */
.hprog{background:var(--card);border-radius:11px;border:.5px solid var(--brd);padding:11px 12px;margin-bottom:.8rem;flex-shrink:0}
.hph{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
.hph span{font-size:12px;color:var(--txt2);font-weight:500}
.pbw{background:var(--bg3);border-radius:99px;height:6px;overflow:hidden}
.pbf{height:100%;border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.pbm{font-size:11px;color:var(--txt3);margin-top:5px;text-align:center}
.hcard{background:var(--card);border-radius:12px;border:.5px solid var(--brd);margin-bottom:8px;cursor:pointer;overflow:hidden;flex-shrink:0}
.hcbar{height:3px}
.hcbody{padding:10px 12px}
.hctop{display:flex;align-items:center;gap:7px;margin-bottom:8px}
.hico{font-size:18px;flex-shrink:0;line-height:1}
.hnm{flex:1;font-size:13px;font-weight:500;color:var(--txt);line-height:1.3}
.hcm{display:flex;align-items:center;gap:4px;flex-shrink:0}
.hstr{font-size:12px;color:var(--txt2);font-weight:600}
.hedit{background:none;border:none;cursor:pointer;font-size:11px;color:var(--txt4);padding:2px 3px}
.hbub{display:flex;gap:5px;flex-wrap:wrap;align-items:flex-end}
.bub{border-radius:50%;border:2px solid currentColor;cursor:pointer;transition:background .15s;flex-shrink:0}
.bub.filled{background:currentColor}
.bsm{width:25px;height:25px}.blg{width:34px;height:34px}
.htl{font-size:9px;color:var(--txt4);text-align:center;margin-top:1px}
.hbwrap{display:flex;flex-direction:column;align-items:center;gap:1px}
.hpc{font-size:11px;color:var(--txt3);margin-left:3px}
.hct{font-size:11px;font-weight:500;margin-left:3px}
.huns{opacity:.5}
.hnt{font-size:10px;color:var(--txt4);font-style:italic;margin-top:4px}
/* HABIT FORM */
.hff{margin-bottom:11px}
.hff label{display:block;font-size:10px;color:var(--txt3);font-weight:500;letter-spacing:.07em;text-transform:uppercase;margin-bottom:4px}
.hff input[type=text],.hff input[type=time],.hff select{width:100%}
.csw-row{display:flex;gap:6px;flex-wrap:wrap}
.csw{width:26px;height:26px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform .1s}
.csw.sel{border-color:var(--txt);transform:scale(1.12)}
.frow{display:flex;gap:5px;flex-wrap:wrap}
.fbtn{padding:5px 10px;border-radius:99px;border:.5px solid var(--brd2);font-size:12px;cursor:pointer;background:var(--bg3);color:var(--txt2);font-family:inherit}
.fbtn.sel{background:var(--ac);color:var(--acfg);border-color:var(--ac)}
.drow{display:flex;gap:4px;margin-top:7px}
.dck{width:30px;height:30px;border-radius:50%;border:.5px solid var(--brd2);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;background:var(--bg3);color:var(--txt2);font-family:inherit;flex-shrink:0}
.dck.sel{background:var(--ac);color:var(--acfg)}
.tst{display:flex;align-items:center;gap:10px}
.tsb{width:29px;height:29px;border-radius:50%;border:.5px solid var(--brd2);background:var(--bg3);color:var(--txt);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;flex-shrink:0}
.tsv{font-size:16px;font-weight:500;color:var(--txt);min-width:16px;text-align:center}
.tsl{font-size:11px;color:var(--txt3)}
.htgrid{display:flex;flex-direction:column;gap:5px;margin-top:5px}
.htrow{display:flex;align-items:center;gap:8px;padding:5px 9px;background:var(--bg3);border-radius:7px}
.htrow span{font-size:11px;color:var(--txt2);flex-shrink:0;min-width:70px}
.htrow input{flex:1}
/* FOCUS */
.fbubs{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:11px 0 4px}
.fbub{width:36px;height:36px;border-radius:50%;border:2.5px solid currentColor;cursor:pointer;transition:background .15s}
.fbub.filled{background:currentColor}
.fcnt{text-align:center;font-size:12px;color:var(--txt3);margin-bottom:11px}
.fsts{display:flex;justify-content:center;gap:20px;margin-bottom:9px}
.fs{text-align:center}
.fsn{font-size:20px;font-weight:500;color:var(--txt)}
.fsl{font-size:10px;color:var(--txt3);margin-top:1px}
.fq{text-align:center;font-size:12px;color:var(--txt3);font-style:italic;padding:0 8px;margin:9px 0}
.hgs{margin:9px 0}
.hdow{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:2px}
.hdow span{text-align:center;font-size:9px;color:var(--txt4)}
.hgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.hcl{aspect-ratio:1;border-radius:3px;background:var(--bg3)}
.hcl.done{opacity:.85}
.hcl.today{box-shadow:0 0 0 1.5px var(--txt)}
.tmrsec{margin-top:11px;padding-top:11px;border-top:.5px solid var(--brd);text-align:center}
.topts{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin-bottom:7px}
.topt{padding:5px 9px;border-radius:99px;border:.5px solid var(--brd2);font-size:11px;cursor:pointer;background:var(--bg3);color:var(--txt2);font-family:inherit}
.topt.sel{background:var(--ac);color:var(--acfg)}
.tcrow{display:flex;align-items:center;gap:7px;justify-content:center;margin-bottom:7px}
.tcrow input{width:65px;text-align:center;font-size:13px;padding:5px 7px}
.tdisp{font-size:40px;font-weight:200;color:var(--txt);letter-spacing:.04em;margin:3px 0 8px;font-variant-numeric:tabular-nums}
.tbtn{padding:9px 26px;border-radius:99px;border:none;background:var(--ac);color:var(--acfg);font-size:13px;cursor:pointer;font-family:inherit}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div><h1 id="aname">Meu Organizador</h1><p id="dlbl"></p></div>
    <button class="gear-btn" onclick="openCfg()" title="Configurações">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>
  <div class="cnt">
    <!-- TAREFAS -->
    <div id="sec-tasks" class="sec active">
      <div class="tf">
        <div class="tftop"><input type="text" id="task-in" placeholder="Nova tarefa..."/><button class="ib" onclick="addTask()">+</button></div>
        <div class="tf2">
          <div class="tff"><label>Dia</label><input type="date" id="task-date"/></div>
          <div class="tff"><label>Hora</label><input type="time" id="task-time"/></div>
          <div class="tff"><label>Notificar</label>
            <select id="task-ntf">
              <option value="0">Sem aviso</option><option value="5">5 min</option>

  <div class="mh"><h2 id="fc-ttl">Foco</h2><div style="display:flex;gap:7px"><button class="bbk" style="font-size:11px;padding:4px 9px" onclick="editFromFocus()">✏</button><button class="mc" onclick="closeFocus()">×</button></div></div>
  <div class="mb" id="fc-body"></div>

<script>
const MO=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DL=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const COLORS=['#FF6B6B','#FF9F43','#FECA57','#1DD1A1','#48DBFB','#54A0FF','#A29BFE','#FF9FF3'];
const QUOTES=['Disciplina é liberdade.','Um dia de cada vez.','Consistência supera intensidade.','Progresso, não perfeição.','Cada hábito é um voto para quem você quer ser.','Não quebre a corrente.','Pequenos esforços, grandes resultados.','Feito é melhor que perfeito.','Hoje importa.'];
const NOW=new Date(),TY=NOW.getFullYear(),TM=NOW.getMonth(),TD=NOW.getDate();

const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const getDK=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const getToday=()=>getDK(new Date());
const addDays=(d,n)=>{const r=new Date(d);r.setDate(r.getDate()+n);return r;};
const ck=(y,m,d)=>`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
const d2k=s=>s||null;
function fmtDt(dk,dt){if(!dk)return'';const[y,m,d]=dk.split('-').map(Number);const s=new Date(y,m-1,d).toLocaleDateString('pt-BR',{day:'numeric',month:'short'});return dt?`${s} · ${dt}`:s;}
function isOv(dk,dt){if(!dk)return false;const[y,m,d]=dk.split('-').map(Number);if(dt){const[h,mi]=dt.split(':').map(Number);return new Date(y,m-1,d,h,mi)<NOW;}return new Date(y,m-1,d,23,59)<NOW;}

// ── HOLIDAYS ──
function getEaster(y){const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),mo=Math.floor((h+l-7*m+114)/31),day=((h+l-7*m+114)%31)+1;return new Date(y,mo-1,day);}
const hols={};
function ensureHols(y){
  if(hols[y])return hols[y];
  const h={};
  [[1,1,'Confraternização Universal'],[4,21,'Tiradentes'],[5,1,'Dia do Trabalho'],[9,7,'Independência'],[10,12,'N.Sra. Aparecida'],[11,2,'Finados'],[11,15,'Rep. da República'],[12,25,'Natal']].forEach(([m,d,n])=>h[`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`]=n);
  const e=getEaster(y);
  h[getDK(addDays(e,-48))]='Carnaval';h[getDK(addDays(e,-47))]='Carnaval';
  h[getDK(addDays(e,-2))]='Sexta-feira Santa';h[getDK(e)]='Páscoa';h[getDK(addDays(e,60))]='Corpus Christi';
  hols[y]=h;return h;
}
function getHol(y,m,d){return ensureHols(y)[ck(y,m,d)]||null;} // m=0-based
function getHolDK(dk){if(!dk)return null;const[y,m,d]=dk.split('-').map(Number);return ensureHols(y)[dk]||null;}

// ── STORAGE ──
let tasks=[],notes=[],events={};
function load(){try{tasks=JSON.parse(localStorage.getItem('o_tasks'))||[];}catch(e){tasks=[];}try{notes=JSON.parse(localStorage.getItem('o_notes'))||[];}catch(e){notes=[];}try{events=JSON.parse(localStorage.getItem('o_events'))||{};}catch(e){events={};}}
function save(){localStorage.setItem('o_tasks',JSON.stringify(tasks));localStorage.setItem('o_notes',JSON.stringify(notes));localStorage.setItem('o_events',JSON.stringify(events));}

// ── CONFIG ──
let cfg={dark:false,name:'',greet:''};
function loadCfg(){try{const c=JSON.parse(localStorage.getItem('o_cfg'));if(c)cfg={...cfg,...c};}catch(e){}}
function saveCfg(){localStorage.setItem('o_cfg',JSON.stringify(cfg));}
function applyTheme(){document.documentElement.setAttribute('data-theme',cfg.dark?'dark':'');const t=document.getElementById('tog-dark');if(t)t.checked=cfg.dark;}
function toggleTheme(on){cfg.dark=on;saveCfg();applyTheme();}
function applyName(){document.getElementById('aname').textContent=cfg.name||'Meu Organizador';document.getElementById('dlbl').textContent=cfg.greet||NOW.toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});}
function saveName(){const v=document.getElementById('cfg-name').value.trim();if(v){cfg.name=v;saveCfg();applyName();toast('Nome atualizado ✓');}}
function saveGreet(){cfg.greet=document.getElementById('cfg-greet').value.trim();saveCfg();applyName();toast('Saudação atualizada ✓');}
function openCfg(){document.getElementById('cfg-name').value=cfg.name||'';document.getElementById('cfg-greet').value=cfg.greet||'';document.getElementById('tog-dark').checked=cfg.dark;updN();document.getElementById('mo-cfg').classList.add('open');}
function closeCfg(){document.getElementById('mo-cfg').classList.remove('open');}

// ── SW + NOTIF ──
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
function updN(){
  const st=document.getElementById('nst'),btn=document.getElementById('nbtn');
  if(!('Notification' in window)){st.textContent='Não suportado';st.className='ns off';btn.style.display='none';return;}
  const p=Notification.permission;st.className='ns '+(p==='granted'?'on':'off');
  if(p==='granted'){st.textContent='● Ativas';btn.textContent='Info';btn.onclick=()=>alert('Desative em Configurações do Chrome → Notificações.');}
  else if(p==='denied'){st.textContent='● Bloqueadas';btn.textContent='Ativar';btn.onclick=()=>alert('Vá em Configurações do Chrome → Notificações e permita este site.');}
  else{st.textContent='● Inativas';btn.textContent='Ativar';btn.onclick=reqN;}
}
function reqN(){if(!('Notification' in window))return;Notification.requestPermission().then(p=>{updN();if(p==='granted'){schedAll();toast('Notificações ativadas ✓');}});}
let fbT=[];
async function schedN(title,body,delay,tag){
  if(delay<=0)return;
  try{const r=await navigator.serviceWorker.ready;if(r.active){r.active.postMessage({type:'NOTIFY',title,body,delay,tag});return;}}catch(e){}
  fbT.push(setTimeout(()=>{if(Notification.permission==='granted')new Notification(title,{body});},delay));
}
function schedAll(){
  fbT.forEach(t=>clearTimeout(t));fbT=[];
  if(Notification.permission!=='granted')return;
  navigator.serviceWorker.ready.then(r=>{if(r.active)r.active.postMessage({type:'CLEAR_ALL'});}).catch(()=>{});
  const nl=n=>n>=60?`${n/60}h`:`${n}min`;
  tasks.filter(t=>!t.done&&t.dk&&t.dt&&t.nb).forEach(t=>{
    const[y,m,d]=t.dk.split('-').map(Number);const[h,mi]=t.dt.split(':').map(Number);
    const delay=new Date(y,m-1,d,h,mi).getTime()-t.nb*60000-Date.now();
    if(delay>0)schedN('Meu Organizador',`✅ "${t.text}" — faltam ${nl(t.nb)}`,delay,`t-${t.id}`);
  });
  Object.keys(events).forEach(key=>{const[y,m,d]=key.split('-').map(Number);(events[key]||[]).forEach(ev=>{if(!ev.time||!ev.nb)return;const[h,mi]=ev.time.split(':').map(Number);const delay=new Date(y,m-1,d,h,mi).getTime()-ev.nb*60000-Date.now();if(delay>0)schedN('Meu Organizador',`📅 "${ev.text}" às ${ev.time} — faltam ${nl(ev.nb)}`,delay,`e-${ev.id}`);});});
  habits.forEach(h=>{
    if(!isSchedOn(h,new Date()))return;
    if(h.times&&h.times.length){
      const cnt=getHabCnt(h);
      h.times.forEach((t,i)=>{if(!t||i<cnt)return;const[hh,mm]=t.split(':').map(Number);const at=new Date();at.setHours(hh,mm,0,0);const delay=at-Date.now();if(delay>0)schedN('Meu Organizador',`${h.icon} ${h.name} — ocorrência ${i+1}!`,delay,`hab-${h.id}-${i}`);});
    } else if(h.reminderTime){const[hh,mm]=h.reminderTime.split(':').map(Number);const at=new Date();at.setHours(hh,mm,0,0);const delay=at-Date.now();if(delay>0)schedN('Meu Organizador',`${h.icon} ${h.name} — não esqueça! 🔥`,delay,`hab-${h.id}`);}
  });
}

// ── TABS ──
function swTab(name,btn){document.querySelectorAll('.sec').forEach(s=>s.classList.remove('active'));document.querySelectorAll('.tb').forEach(b=>b.classList.remove('active'));document.getElementById('sec-'+name).classList.add('active');btn.classList.add('active');}
function bgC(e,id){if(e.target===document.getElementById(id))document.getElementById(id).classList.remove('open');}

// ── TOAST ──
function toast(msg){const t=document.createElement('div');t.style.cssText='position:fixed;bottom:78px;left:50%;transform:translateX(-50%);background:var(--ac);color:var(--acfg);padding:7px 16px;border-radius:20px;font-size:12px;z-index:999;white-space:nowrap;pointer-events:none;box-shadow:0 2px 12px rgba(0,0,0,.16)';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>{t.style.transition='opacity .3s';t.style.opacity='0';setTimeout(()=>t.remove(),300);},2200);}

// ── TASKS ──
let doneExp=false;
function addTask(){
  const inp=document.getElementById('task-in'),text=inp.value.trim();if(!text)return;
  const dk=d2k(document.getElementById('task-date').value);
  const dt=document.getElementById('task-time').value||null;
  const nb=parseInt(document.getElementById('task-ntf').value)||0;
  tasks.unshift({id:Date.now(),text,done:false,dk,dt,nb});
  inp.value='';document.getElementById('task-date').value='';document.getElementById('task-time').value='';
  save();schedAll();renderTasks();renderCal();
}
function togTask(id){tasks=tasks.map(t=>t.id===id?{...t,done:!t.done}:t);save();renderTasks();if(selD!==null)renderEvList();}
function delTask(id){tasks=tasks.filter(t=>t.id!==id);save();schedAll();renderTasks();renderCal();}
function reactivate(id){tasks=tasks.map(t=>t.id===id?{...t,done:false}:t);save();renderTasks();}
function tiHTML(t,done=false){
  const meta=fmtDt(t.dk,t.dt),ov=!t.done&&isOv(t.dk,t.dt);
  const acts=done?`<div class="dtb"><button class="brev" onclick="reactivate(${t.id})">↩</button><button class="bperm" onclick="delTask(${t.id})">🗑</button></div>`:`<button class="bd" onclick="delTask(${t.id})">×</button>`;
  return`<div class="ti"><div class="tck ${t.done?'done':''}" onclick="togTask(${t.id})">${t.done?`<svg width="9" height="7" viewBox="0 0 9 7" fill="none"><path d="M1 3.5l2.5 2.5 4.5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`:''}</div><div class="tb2"><div class="tt ${t.done?'done':''}">${esc(t.text)}</div>${meta?`<div class="tm ${ov?'ov':''}">${ov?'⚠ ':'📅 '}${esc(meta)}</div>`:''}</div>${acts}</div>`;
}
function renderTasks(){
  const pend=tasks.filter(t=>!t.done).sort((a,b)=>{if(!a.dk&&!b.dk)return 0;if(!a.dk)return 1;if(!b.dk)return-1;return a.dk.localeCompare(b.dk);});
  const done=tasks.filter(t=>t.done);
  const pEl=document.getElementById('t-pend'),dEl=document.getElementById('t-done-wrap');
  pEl.innerHTML=!tasks.length?'<p class="empty">Nenhuma tarefa ainda.</p>':pend.length?`<p class="lbl">Pendentes · ${pend.length}</p>`+pend.map(t=>tiHTML(t)).join(''):'';
  dEl.innerHTML=done.length?`<button class="dtoggle ${doneExp?'open':''}" onclick="doneExp=!doneExp;renderTasks()"><svg width="11" height="11" viewBox="0 0 11 11" fill="none"><rect x="1" y="1" width="9" height="9" rx="2" stroke="currentColor" stroke-width="1.2"/><path d="M3 5.5l1.5 1.5 3.5-3.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg> Concluídas · ${done.length}<span class="arr">›</span></button><div style="display:${doneExp?'block':'none'}">${done.map(t=>tiHTML(t,true)).join('')}</div>`:'';
}

// ── NOTES ──
let enid=null;
function openNote(id){enid=id;const n=id==='new'?null:notes.find(n=>n.id===id);document.getElementById('nt-ttl').value=n?n.title:'';document.getElementById('nt-bdy').value=n?n.body:'';document.getElementById('nlv').style.display='none';document.getElementById('nev').classList.add('open');history.pushState({note:true},'');}
function closeNote(){document.getElementById('nlv').style.display='flex';document.getElementById('nev').classList.remove('open');enid=null;}
function saveNote(){const title=document.getElementById('nt-ttl').value.trim()||'Sem título';const body=document.getElementById('nt-bdy').value.trim();if(enid==='new')notes.unshift({id:Date.now(),title,body,date:NOW.toLocaleDateString('pt-BR')});else notes=notes.map(n=>n.id===enid?{...n,title,body}:n);save();renderNotes();closeNote();}
function delNote(id){notes=notes.filter(n=>n.id!==id);save();renderNotes();}
function renderNotes(){const g=document.getElementById('ngrid');if(!notes.length){g.innerHTML='<p class="empty" style="grid-column:1/-1">Nenhuma anotação ainda.</p>';return;}g.innerHTML=notes.map(n=>`<div class="nc" onclick="openNote(${n.id})"><h3>${esc(n.title)}</h3><p>${esc(n.body||'Sem conteúdo')}</p><div class="nf"><span class="nd">${n.date}</span><button class="bd" onclick="event.stopPropagation();delNote(${n.id})">×</button></div></div>`).join('');}
window.addEventListener('popstate',()=>{if(document.getElementById('nev').classList.contains('open'))closeNote();});

// ── CALENDAR ──
let cY=TY,cM=TM,selD=null,calView='month',wkOff=0;
function ckSel(){return selD!==null?ck(cY,cM,selD):null;}
function setView(v){calView=v;['month','week','day'].forEach(x=>document.getElementById('vbtn-'+x).classList.toggle('sel',x===v));if(v==='week')wkOff=0;document.getElementById('ev-sec').style.display='none';selD=null;renderCal();}
function chMonth(dir){
  if(calView==='month'){cM+=dir;if(cM<0){cM=11;cY--;}if(cM>11){cM=0;cY++;}selD=null;document.getElementById('ev-sec').style.display='none';renderCal();}
  else if(calView==='week'){wkOff+=dir;renderCal();}
  else{if(selD===null){selD=TD;}const d=addDays(new Date(cY,cM,selD),dir);cY=d.getFullYear();cM=d.getMonth();selD=d.getDate();renderCal();selDay(selD);}
}
function selDay(d){
  selD=d;renderCal();
  document.getElementById('ev-sec').style.display='block';
  document.getElementById('ev-dlbl').textContent=new Date(cY,cM,d).toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const hol=getHol(cY,cM,d);const hr=document.getElementById('hol-row');
  if(hol){hr.style.display='flex';document.getElementById('hol-nm').textContent=hol;}else hr.style.display='none';
  renderEvList();
}
function addEvent(){
  const text=document.getElementById('ev-in').value.trim();if(!text||selD===null)return;
  const time=document.getElementById('ev-time').value||null,nb=parseInt(document.getElementById('ev-ntf').value)||0;
  const k=ckSel();if(!events[k])events[k]=[];events[k].push({id:Date.now(),text,time,nb});
  document.getElementById('ev-in').value='';document.getElementById('ev-time').value='';
  save();schedAll();renderEvList();renderCal();
}
function delEv(key,id){events[key]=(events[key]||[]).filter(e=>e.id!==id);save();schedAll();renderEvList();renderCal();}
function renderEvList(){
  if(selD===null)return;
  const k=ckSel(),evs=(events[k]||[]).slice().sort((a,b)=>(a.time||'').localeCompare(b.time||'')),dT=tasks.filter(t=>t.dk===k),el=document.getElementById('ev-list');
  if(!evs.length&&!dT.length){el.innerHTML='<p style="font-size:12px;color:var(--txt4)">Sem eventos ou tarefas neste dia.</p>';return;}
  const nl=n=>n>=60?`${n/60}h antes`:`${n}min antes`;
  const th=dT.map(t=>`<div class="evi ${t.done?'done-ev':''}"><div class="tck ${t.done?'done':''}" style="width:15px;height:15px;margin-top:0;flex-shrink:0" onclick="togTask(${t.id})">${t.done?`<svg width="8" height="6" viewBox="0 0 8 6" fill="none"><path d="M1 3l2 2 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>`:''}</div><div class="ei2"><div class="et2 ${t.done?'done':''}">${esc(t.text)}<span class="ebdg etask">tarefa</span></div>${t.dt?`<div class="em2">🕐 ${t.dt}</div>`:''}</div></div>`).join('');
  const eh=evs.map(ev=>`<div class="evi"><div class="ei2"><div class="et2">${esc(ev.text)}</div><div class="em2">${ev.time?`🕐 ${ev.time}`:'Sem horário'}${ev.nb?`<span class="ebdg">🔔 ${nl(ev.nb)}</span>`:''}</div></div><button class="bd" onclick="delEv('${k}',${ev.id})">×</button></div>`).join('');
  el.innerHTML=(dT.length?`<p class="lbl" style="margin-bottom:4px">Tarefas</p>`+th:'')+(evs.length?`<p class="lbl" style="margin-top:${dT.length?6:0}px;margin-bottom:4px">Eventos</p>`+eh:'');
}
function renderCal(){if(calView==='month')renderMonth();else if(calView==='week')renderWeek();else renderDay();}
function renderMonth(){
  ensureHols(cY);
  document.getElementById('cal-main').innerHTML=`<div class="cnr"><button class="cnv" onclick="chMonth(-1)">‹</button><span>${MO[cM]} ${cY}</span><button class="cnv" onclick="chMonth(1)">›</button></div><div class="cdow">${DL.map(d=>`<span>${d[0]}</span>`).join('')}</div><div id="cgrid" class="cgrid"></div>`;
  const fd=new Date(cY,cM,1).getDay(),dim=new Date(cY,cM+1,0).getDate();let h='';
  for(let i=0;i<fd;i++)h+='<div class="cc emp"></div>';
  for(let d=1;d<=dim;d++){
    const past=cY<TY||(cY===TY&&cM<TM)||(cY===TY&&cM===TM&&d<TD),isT=d===TD&&cM===TM&&cY===TY,isSel=d===selD;
    const k=ck(cY,cM,d),hasDot=(events[k]||[]).length>0||tasks.some(t=>t.dk===k),hol=getHol(cY,cM,d);
    h+=`<div class="${['cc',past?'past':'',isT?'today':'',isSel?'sel':'',hasDot?'dot':'',hol?'hol':''].filter(Boolean).join(' ')}" onclick="selDay(${d})" title="${esc(hol||'')}">${d}</div>`;
  }
  document.getElementById('cgrid').innerHTML=h;
}
function renderWeek(){
  const ref=new Date(TY,TM,TD);ref.setDate(ref.getDate()+wkOff*7);
  const ws=new Date(ref);ws.setDate(ref.getDate()-ref.getDay());
  const we=new Date(ws);we.setDate(ws.getDate()+6);
  const lbl=`${ws.toLocaleDateString('pt-BR',{day:'numeric',month:'short'})} – ${we.toLocaleDateString('pt-BR',{day:'numeric',month:'short'})}`;
  let strip='';
  for(let i=0;i<7;i++){
    const d=new Date(ws);d.setDate(ws.getDate()+i);
    const y=d.getFullYear(),mo=d.getMonth(),dy=d.getDate(),past=d<new Date(TY,TM,TD),isT=dy===TD&&mo===TM&&y===TY,isSel=selD===dy&&cM===mo&&cY===y;
    const k=ck(y,mo,dy),hasDot=(events[k]||[]).length>0||tasks.some(t=>t.dk===k),hol=getHol(y,mo,dy);
    strip+=`<div class="${['wd',past?'past':'',isT?'today':'',isSel?'sel':'',hasDot?'dot':'',hol?'hol':''].filter(Boolean).join(' ')}" onclick="cY=${y};cM=${mo};selDay(${dy})" title="${esc(hol||'')}"><span class="wdn">${DL[d.getDay()].substring(0,3)}</span><span class="wdd">${dy}</span></div>`;
  }
  document.getElementById('cal-main').innerHTML=`<div class="cnr"><button class="cnv" onclick="chMonth(-1)">‹</button><span style="font-size:12px">${lbl}</span><button class="cnv" onclick="chMonth(1)">›</button></div><div class="wstrip">${strip}</div>`;
}
function renderDay(){
  if(selD===null){selD=TD;cY=TY;cM=TM;}
  const d=new Date(cY,cM,selD),dlbl=d.toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'}),k=ck(cY,cM,selD);
  const evs=(events[k]||[]).slice().sort((a,b)=>(a.time||'ZZ').localeCompare(b.time||'ZZ'));
  const dT=tasks.filter(t=>t.dk===k).sort((a,b)=>(a.dt||'ZZ').localeCompare(b.dt||'ZZ'));
  const hol=getHol(cY,cM,selD);
  const items=[...dT.map(t=>({type:'task',time:t.dt||'',obj:t})),...evs.map(e=>({type:'ev',time:e.time||'',obj:e}))].sort((a,b)=>a.time.localeCompare(b.time));
  const ihtml=items.length?items.map(it=>{
    if(it.type==='task'){const t=it.obj;return`<div class="dti"><span class="dtt">${t.dt||'—'}</span><div class="dtb2"><div class="dttl ${t.done?'done':''}">${esc(t.text)}<span class="ebdg etask">tarefa</span></div></div><div class="tck ${t.done?'done':''}" style="width:15px;height:15px;margin-top:0;flex-shrink:0" onclick="togTask(${t.id});renderDay()">${t.done?`<svg width="8" height="6" viewBox="0 0 8 6" fill="none"><path d="M1 3l2 2 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>`:''}</div></div>`;}
    else{const e=it.obj;return`<div class="dti"><span class="dtt">${e.time||'—'}</span><div class="dtb2"><div class="dttl">${esc(e.text)}<span class="ebdg eev">evento</span></div></div><button class="bd" onclick="delEv('${k}',${e.id});renderDay()">×</button></div>`;}
  }).join(''):'<p class="empty" style="margin-top:1rem">Nenhum item neste dia.</p>';
  document.getElementById('cal-main').innerHTML=`<div class="cnr"><button class="cnv" onclick="chMonth(-1)">‹</button><span style="font-size:12px">${dlbl}</span><button class="cnv" onclick="chMonth(1)">›</button></div>${hol?`<div class="holbanner">🎉 ${esc(hol)}</div>`:''}<div class="dtl">${ihtml}</div>`;
  document.getElementById('ev-sec').style.display='block';
  document.getElementById('ev-dlbl').textContent=d.toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  document.getElementById('hol-row').style.display='none';
  renderEvList();
}
function renderSearch(){
  const q=document.getElementById('cal-srch').value.trim().toLowerCase(),res=document.getElementById('srch-res');
  if(!q){res.style.display='none';return;}
  const R=[];
  tasks.forEach(t=>{if(t.text.toLowerCase().includes(q))R.push({title:t.text,meta:`📅 ${t.dk?fmtDt(t.dk,t.dt):'Sem data'}`,dk:t.dk,type:'tarefa'});});
  Object.keys(events).forEach(k=>{(events[k]||[]).forEach(ev=>{if(ev.text.toLowerCase().includes(q)){const[y,m,d]=k.split('-').map(Number);R.push({title:ev.text,meta:`📅 ${new Date(y,m-1,d).toLocaleDateString('pt-BR',{day:'numeric',month:'short',year:'numeric'})}${ev.time?' '+ev.time:''}`,dk:k,type:'evento'});}});});
  res.style.display='block';
  res.innerHTML=!R.length?'<p style="font-size:12px;color:var(--txt4);text-align:center;padding:7px">Nenhum resultado.</p>':R.slice(0,7).map(r=>`<div class="sri" onclick="jumpDK('${r.dk||''}')"><div class="sri-t">${esc(r.title)} <span class="ebdg">${r.type}</span></div><div class="sri-m">${esc(r.meta)}</div></div>`).join('');
}
function jumpDK(dk){if(!dk)return;const[y,m,d]=dk.split('-').map(Number);cY=y;cM=m-1;selD=d;document.getElementById('cal-srch').value='';document.getElementById('srch-res').style.display='none';if(calView!=='month')setView('month');else{renderCal();selDay(d);}}

// ── HABITS ──
let habits=[],hfd={id:null,icon:'⭐',name:'',color:'#54A0FF',target:1,times:[],frequency:'daily',customDays:[],reminderTime:''},focusH=null,focTmr=null;
function loadHabits(){try{habits=JSON.parse(localStorage.getItem('o_habits2'))||[];}catch(e){habits=[];}}
function saveHabits(){localStorage.setItem('o_habits2',JSON.stringify(habits));}
function isSchedOn(h,date){const w=date.getDay();if(h.frequency==='daily')return true;if(h.frequency==='weekdays')return w>=1&&w<=5;if(h.frequency==='custom')return(h.customDays||[]).includes(w);return true;}
function getHabCnt(h){return(h.history||{})[getToday()]||0;}
function isHabDone(h){return getHabCnt(h)>=h.target;}
function compStreak(h){const hist=h.history||{};let s=0,d=new Date();d.setHours(0,0,0,0);if(!isHabDone(h))d.setDate(d.getDate()-1);for(let i=0;i<366;i++){if(!isSchedOn(h,d)){d.setDate(d.getDate()-1);continue;}const k=getDK(d);if((hist[k]||0)>=h.target){s++;d.setDate(d.getDate()-1);}else break;}return s;}
function getBadge(s){return s>=100?'💎':s>=30?'🥇':s>=15?'🥈':s>=7?'🥉':'';}
function setBubble(id,idx){const h=habits.find(h=>h.id===id);if(!h)return;const today=getToday();if(!h.history)h.history={};const cur=h.history[today]||0;h.history[today]=cur===h.target&&idx===h.target-1?0:idx+1;saveHabits();renderHabits();if(focusH&&focusH.id===id){focusH=habits.find(x=>x.id===id);renderFocusBody();}}
function habCardHTML(h){
  const cnt=getHabCnt(h),str=compStreak(h),bdg=getBadge(str),sched=isSchedOn(h,new Date()),done=isHabDone(h);
  const bsz=h.target===1?'blg':'bsm';
  let bubs='';
  for(let i=0;i<h.target;i++){const tl=h.times&&h.times[i]?`<div class="htl">${h.times[i]}</div>`:'';bubs+=`<div class="hbwrap"><div class="bub ${bsz} ${i<cnt?'filled':''}" style="color:${h.color}" onclick="event.stopPropagation();setBubble(${h.id},${i})"></div>${tl}</div>`;}
  return`<div class="hcard ${!sched?'huns':''}" onclick="openFocus(${h.id})"><div class="hcbar" style="background:${h.color}"></div><div class="hcbody"><div class="hctop"><span class="hico">${h.icon}</span><span class="hnm">${esc(h.name)}</span><div class="hcm">${str>0?`<span class="hstr">🔥${str}</span>`:''}${bdg?`<span style="font-size:13px">${bdg}</span>`:''}<button class="hedit" onclick="event.stopPropagation();openHF(${h.id})">✏</button></div></div><div class="hbub">${bubs}<span class="hpc">${cnt}/${h.target}</span>${done?`<span class="hct" style="color:${h.color}">✓ Feito!</span>`:''}</div>${!sched?'<div class="hnt">Não programado para hoje</div>':''}</div></div>`;
}
function renderHabits(){
  const tod=habits.filter(h=>isSchedOn(h,new Date())),dn=tod.filter(h=>isHabDone(h)),pct=tod.length?Math.round(dn.length/tod.length*100):0;
  const g=pct===100?'#1DD1A1,#48DBFB':'#54A0FF,#A29BFE';
  document.getElementById('hab-list').innerHTML=`<div class="hprog"><div class="hph"><span>${dn.length}/${tod.length} hoje</span><span style="font-size:11px;color:var(--txt3)">${pct}%</span></div><div class="pbw"><div class="pbf" style="width:${pct}%;background:linear-gradient(90deg,${g})"></div></div>${pct===100&&tod.length?'<div class="pbm">🎉 Todos concluídos hoje!</div>':''}</div>${habits.length?habits.map(habCardHTML).join(''):'<p class="empty">Nenhum hábito ainda.</p>'}<button class="bnn" style="margin-top:6px" onclick="openHF(null)">+ Novo hábito</button>`;
}
function openHF(id){if(id){const h=habits.find(h=>h.id===id);if(h)hfd={...h,customDays:[...(h.customDays||[])],times:[...(h.times||[])]};document.getElementById('hf-ttl').textContent='Editar hábito';}else{hfd={id:null,icon:'⭐',name:'',color:COLORS[5],target:1,times:[],frequency:'daily',customDays:[],reminderTime:''};document.getElementById('hf-ttl').textContent='Novo hábito';}renderHF();document.getElementById('mo-hf').classList.add('open');}
function closeHF(){document.getElementById('mo-hf').classList.remove('open');}
function setHabTime(i,v){if(!hfd.times)hfd.times=[];hfd.times[i]=v;}
function renderHF(){
  const tms=hfd.target>1?`<div class="hff"><label>Horários por ocorrência <span style="font-weight:400;font-size:9px">(opcional — notificação automática)</span></label><div class="htgrid">${Array.from({length:hfd.target},(_,i)=>`<div class="htrow"><span>Ocorrência ${i+1}</span><input type="time" value="${(hfd.times||[])[i]||''}" onchange="setHabTime(${i},this.value)"/></div>`).join('')}</div></div>`:`<div class="hff"><label>Lembrete</label><input type="time" value="${hfd.reminderTime||''}" onchange="hfd.reminderTime=this.value"/></div>`;
  document.getElementById('hf-body').innerHTML=`<div class="hff"><label>Emoji</label><input type="text" value="${esc(hfd.icon)}" maxlength="2" style="width:54px;font-size:20px;text-align:center" oninput="hfd.icon=this.value"/></div><div class="hff"><label>Nome</label><input type="text" value="${esc(hfd.name)}" placeholder="Ex: Beber água" oninput="hfd.name=this.value"/></div><div class="hff"><label>Cor</label><div class="csw-row">${COLORS.map(c=>`<div class="csw ${hfd.color===c?'sel':''}" style="background:${c}" onclick="hfd.color='${c}';renderHF()"></div>`).join('')}</div></div><div class="hff"><label>Meta diária</label><div class="tst"><button class="tsb" onclick="if(hfd.target>1){hfd.target--;if(hfd.times)hfd.times=hfd.times.slice(0,hfd.target);}renderHF()">−</button><span class="tsv">${hfd.target}</span><button class="tsb" onclick="if(hfd.target<10)hfd.target++;renderHF()">+</button><span class="tsl">${hfd.target===1?'vez/dia':'vezes/dia'}</span></div></div>${tms}<div class="hff"><label>Frequência</label><div class="frow">${[['daily','Diário'],['weekdays','Dias úteis'],['custom','Personalizado']].map(([v,l])=>`<button class="fbtn ${hfd.frequency===v?'sel':''}" onclick="hfd.frequency='${v}';renderHF()">${l}</button>`).join('')}</div>${hfd.frequency==='custom'?`<div class="drow">${['D','S','T','Q','Q','S','S'].map((d,i)=>`<button class="dck ${(hfd.customDays||[]).includes(i)?'sel':''}" onclick="togCDay(${i})">${d}</button>`).join('')}</div>`:''}</div>${hfd.id?`<button style="width:100%;padding:8px;border-radius:8px;border:.5px solid #e44;background:transparent;color:#e44;cursor:pointer;font-size:12px;font-family:inherit;margin-top:3px" onclick="delHabit(${hfd.id})">🗑 Excluir hábito</button>`:''}`;
}
function togCDay(d){const i=(hfd.customDays||[]).indexOf(d);if(i>=0)hfd.customDays.splice(i,1);else hfd.customDays.push(d);renderHF();}
function saveHabit(){if(!hfd.name.trim()){toast('Digite um nome');return;}if(!hfd.times)hfd.times=[];if(hfd.id)habits=habits.map(h=>h.id===hfd.id?{...h,...hfd}:h);else habits.push({...hfd,id:Date.now(),history:{}});saveHabits();renderHabits();schedAll();closeHF();toast(hfd.id?'Hábito atualizado ✓':'Hábito criado ✓');}
function delHabit(id){if(!confirm('Excluir este hábito?'))return;habits=habits.filter(h=>h.id!==id);saveHabits();renderHabits();closeHF();if(focusH&&focusH.id===id)closeFocus();toast('Hábito excluído');}

// ── FOCUS ──
function openFocus(id){const h=habits.find(h=>h.id===id);if(!h)return;focusH=h;if(focTmr){clearInterval(focTmr.intv);focTmr=null;}document.getElementById('fc-ttl').textContent=`${h.icon} ${h.name}`;renderFocusBody();document.getElementById('mo-focus').classList.add('open');}
function closeFocus(){document.getElementById('mo-focus').classList.remove('open');if(focTmr){clearInterval(focTmr.intv);focTmr=null;}focusH=null;}
function editFromFocus(){if(focusH){const id=focusH.id;closeFocus();openHF(id);}}
function renderFocusBody(){
  if(!focusH)return;
  const h=habits.find(x=>x.id===focusH.id)||focusH,cnt=getHabCnt(h),str=compStreak(h),bdg=getBadge(str),q=QUOTES[Math.floor(Math.random()*QUOTES.length)];
  let fb='';for(let i=0;i<h.target;i++){const tl=h.times&&h.times[i]?`<div style="font-size:9px;color:var(--txt4);margin-top:2px">${h.times[i]}</div>`:'';fb+=`<div style="display:flex;flex-direction:column;align-items:center"><div class="fbub ${i<cnt?'filled':''}" style="color:${h.color}" onclick="setBubble(${h.id},${i})"></div>${tl}</div>`;}
  let hcells='';for(let i=27;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const k=getDK(d),dn=(h.history||{})[k]>=(h.target||1),sc=isSchedOn(h,d),isT=i===0;hcells+=`<div class="hcl ${dn?'done':''} ${!sc?'unsch':''} ${isT?'today':''}" style="${dn?`background:${h.color}`:''}"></div>`;}
  const isC=focTmr&&![5,10,15,30].includes(focTmr.dur),td=focTmr?fmtTimer(focTmr.remaining):'--:--',tb=!focTmr?'Iniciar':focTmr.running?'Pausar':'Continuar';
  document.getElementById('fc-body').innerHTML=`<div class="fbubs">${fb}</div><div class="fcnt">${cnt}/${h.target}${cnt>=h.target?' · ✓ Concluído!':''}</div>${str>0||bdg?`<div class="fsts">${str>0?`<div class="fs"><div class="fsn">🔥 ${str}</div><div class="fsl">dias seguidos</div></div>`:''} ${bdg?`<div class="fs"><div class="fsn">${bdg}</div><div class="fsl">${str>=100?'Diamante':str>=30?'Ouro':str>=15?'Prata':'Bronze'}</div></div>`:''}</div>`:''}<div class="fq">"${q}"</div><div class="hgs"><div class="lbl" style="margin-bottom:4px">Últimos 28 dias</div><div class="hdow">${DL.map(d=>`<span>${d[0]}</span>`).join('')}</div><div class="hgrid">${hcells}</div></div><div class="tmrsec"><div class="lbl" style="margin-bottom:6px">Timer de foco</div><div class="topts">${[5,10,15,30].map(m=>`<button class="topt ${focTmr&&focTmr.dur===m&&!isC?'sel':''}" onclick="setTmr(${m})">${m} min</button>`).join('')}<button class="topt ${isC?'sel':''}" onclick="showCT()">Personalizado</button></div><div id="ct-row" class="tcrow" style="display:${isC?'flex':'none'}"><input type="number" id="ct-in" min="1" max="360" value="${isC?focTmr.dur:25}" style=""/><span>min (máx 6h)</span><button class="bbk" style="font-size:11px;padding:4px 9px" onclick="applyCT()">Ok</button></div><div class="tdisp" id="t-disp">${td}</div><button class="tbtn" id="t-btn" onclick="togTmr()">${tb}</button></div>`;
}
function showCT(){const r=document.getElementById('ct-row');if(r)r.style.display=r.style.display==='none'?'flex':'none';}
function applyCT(){const v=Math.max(1,Math.min(360,parseInt(document.getElementById('ct-in').value)||25));setTmr(v);}
function setTmr(min){if(focTmr)clearInterval(focTmr.intv);focTmr={dur:min,remaining:min*60,running:false,intv:null};renderFocusBody();}
function togTmr(){
  if(!focTmr)return;
  if(focTmr.running){clearInterval(focTmr.intv);focTmr.running=false;focTmr.intv=null;const b=document.getElementById('t-btn');if(b)b.textContent='Continuar';}
  else{focTmr.running=true;focTmr.intv=setInterval(()=>{focTmr.remaining--;const d=document.getElementById('t-disp');if(d)d.textContent=fmtTimer(focTmr.remaining);if(focTmr.remaining<=0){clearInterval(focTmr.intv);focTmr.running=false;focTmr.intv=null;const d2=document.getElementById('t-disp');if(d2)d2.textContent='00:00';const b=document.getElementById('t-btn');if(b){b.textContent='Reiniciar';b.onclick=()=>setTmr(focTmr.dur);}toast(`⏱ ${focusH?focusH.icon:''} Tempo concluído!`);if(Notification.permission==='granted')new Notification('Meu Organizador',{body:`⏱ Timer: ${focusH?focusH.icon+' '+focusH.name:''} concluído!`});}},1000);const b=document.getElementById('t-btn');if(b)b.textContent='Pausar';}
}
function fmtTimer(s){return`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;}

// ── INIT ──
load();loadCfg();loadHabits();
applyTheme();applyName();
(function(){const p=new URLSearchParams(location.search),txt=(p.get('text')||p.get('url')||'').trim();if(txt){notes.unshift({id:Date.now(),title:p.get('title')||'Compartilhado',body:txt,date:NOW.toLocaleDateString('pt-BR')});save();history.replaceState(null,'',location.pathname);window._shared=true;}})();
schedAll();renderTasks();renderNotes();renderCal();renderHabits();
ensureHols(TY);ensureHols(TY+1);
document.getElementById('task-in').addEventListener('keydown',e=>{if(e.key==='Enter')addTask();});
document.getElementById('ev-in').addEventListener('keydown',e=>{if(e.key==='Enter')addEvent();});
if(window._shared){swTab('notes',document.getElementById('tb-notes'));toast('✓ Texto salvo nas notas!');}
document.addEventListener('visibilitychange',()=>{if(!document.hidden)schedAll();});
</script>
