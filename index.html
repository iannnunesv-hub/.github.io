
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
<meta name="theme-color" content="#ffffff"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<link rel="manifest" href="./manifest.json"/>
<title>Meu Organizador</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fafafa;--bg2:#fff;--bg3:#f5f5f5;--bg4:#ececec;
  --border:#eee;--border2:#ddd;
  --txt:#222;--txt2:#666;--txt3:#aaa;--txt4:#ccc;
  --accent:#222;--accent-fg:#fff;
  --card:#fff;--input-bg:#fff;
}
[data-theme=dark]{
  --bg:#111;--bg2:#1a1a1a;--bg3:#222;--bg4:#0d0d0d;
  --border:#2a2a2a;--border2:#333;
  --txt:#eee;--txt2:#aaa;--txt3:#666;--txt4:#444;
  --accent:#e0e0e0;--accent-fg:#111;
  --card:#1e1e1e;--input-bg:#252525;
}
body{font-family:system-ui,sans-serif;background:var(--bg4);display:flex;justify-content:center;min-height:100vh;padding:.5rem;transition:background .2s}
#app{width:100%;max-width:480px;background:var(--bg);border-radius:16px;border:.5px solid var(--border);overflow:hidden;display:flex;flex-direction:column;min-height:97vh;transition:background .2s,border-color .2s}
.hdr{background:var(--bg2);border-bottom:.5px solid var(--border);padding:13px 16px 10px;display:flex;justify-content:space-between;align-items:center;transition:background .2s}
.hdr-l h1{font-size:17px;font-weight:500;color:var(--txt)}
.hdr-l p{font-size:12px;color:var(--txt3);margin-top:1px}
.gear-btn{background:none;border:.5px solid var(--border2);border-radius:8px;padding:6px 8px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--txt2);transition:background .15s}
.gear-btn:hover{background:var(--bg3)}
.content{flex:1;overflow-y:auto;overflow-x:hidden}
.sec{display:none;padding:1.2rem 1rem}
.sec.active{display:block}
.tabbar{display:flex;border-top:.5px solid var(--border);background:var(--bg2);flex-shrink:0}
.tb{flex:1;padding:10px 2px 8px;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--txt4);font-size:10px;font-family:inherit;transition:color .15s}
.tb.active{color:var(--txt);font-weight:500}
.tb svg{width:17px;height:17px}
input,textarea,select{padding:8px 11px;border-radius:8px;border:.5px solid var(--border2);font-size:13px;outline:none;font-family:inherit;background:var(--input-bg);color:var(--txt);transition:background .2s,border-color .2s}
textarea{resize:none;line-height:1.7;width:100%}
.row{display:flex;gap:7px;margin-bottom:8px;align-items:stretch}
.row>input[type=text]{flex:1}
.ib{padding:8px 14px;border-radius:8px;border:none;background:var(--accent);color:var(--accent-fg);font-size:17px;cursor:pointer;line-height:1;flex-shrink:0}
.bdel{background:none;border:none;cursor:pointer;color:var(--txt4);font-size:17px;line-height:1;padding:0 3px;flex-shrink:0}
.lbl{font-size:10px;color:var(--txt3);margin-bottom:5px;font-weight:500;letter-spacing:.07em;text-transform:uppercase}
.empty{text-align:center;color:var(--txt4);font-size:13px;margin-top:2rem}
.bbk{background:none;border:.5px solid var(--border2);border-radius:8px;padding:6px 11px;cursor:pointer;font-size:12px;color:var(--txt2);font-family:inherit}
.bsv{background:var(--accent);color:var(--accent-fg);border:none;border-radius:8px;padding:6px 13px;font-size:12px;cursor:pointer;font-family:inherit}

/* MODAL CONFIGURAÇÕES */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border-radius:18px 18px 0 0;width:100%;max-width:480px;padding:0 0 2rem;max-height:85vh;overflow-y:auto;transform:translateY(30px);transition:transform .25s}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;padding:18px 20px 12px;border-bottom:.5px solid var(--border)}
.modal-hdr h2{font-size:15px;font-weight:500;color:var(--txt)}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--txt3);line-height:1;padding:0}
.cfg-section{padding:14px 20px 0}
.cfg-section-title{font-size:10px;color:var(--txt3);font-weight:500;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
.cfg-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:.5px solid var(--border)}
.cfg-row:last-child{border-bottom:none}
.cfg-label{font-size:14px;color:var(--txt)}
.cfg-sub{font-size:11px;color:var(--txt3);margin-top:2px}
.cfg-right{display:flex;align-items:center;gap:8px}

/* TOGGLE SWITCH */
.tog{position:relative;width:44px;height:24px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0;position:absolute}
.tog-sl{position:absolute;inset:0;background:var(--border2);border-radius:24px;cursor:pointer;transition:background .2s}
.tog-sl::before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:transform .2s}
.tog input:checked+.tog-sl{background:#4a4a4a}
[data-theme=dark] .tog input:checked+.tog-sl{background:#aaa}
.tog input:checked+.tog-sl::before{transform:translateX(20px)}

/* NOME EDIT */
.cfg-name-row{display:flex;gap:8px;padding-top:10px;align-items:center}
.cfg-name-row input{flex:1;font-size:14px}

/* NOTIF ROW */
.notif-status{font-size:12px;font-weight:500}
.notif-status.on{color:#3a3}
.notif-status.off{color:var(--txt3)}
.btn-notif-cfg{background:var(--accent);color:var(--accent-fg);border:none;border-radius:7px;padding:6px 12px;font-size:12px;cursor:pointer;font-family:inherit}

/* tasks */
.tf{background:var(--card);border-radius:11px;border:.5px solid var(--border);padding:11px;margin-bottom:1rem}
.tf-r2{display:flex;gap:6px;margin-top:7px;flex-wrap:wrap}
.tf-r2 input,.tf-r2 select{flex:1;min-width:80px;font-size:12px;padding:7px 8px}
.ti{display:flex;align-items:flex-start;gap:9px;padding:10px 12px;border-radius:9px;border:.5px solid var(--border);margin-bottom:6px;background:var(--card)}
.tck{width:19px;height:19px;border-radius:50%;border:1.5px solid var(--txt4);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px}
.tck.done{background:var(--accent);border-color:var(--accent)}
.tb2{flex:1;min-width:0}
.tt{font-size:13px;color:var(--txt);line-height:1.4}
.tt.done{color:var(--txt4);text-decoration:line-through}
.tm{font-size:11px;color:var(--txt3);margin-top:2px}
.tm.ov{color:#e44}
.dg{margin-top:1rem}

/* notes */
.ng{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.nc{border-radius:10px;border:.5px solid var(--border);padding:12px;cursor:pointer;background:var(--card)}
.nc h3{font-size:13px;font-weight:500;color:var(--txt);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nc p{font-size:12px;color:var(--txt3);margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.nf{display:flex;justify-content:space-between;align-items:center}
.nd{font-size:10px;color:var(--txt4)}
.bnn{width:100%;padding:10px;border-radius:9px;border:.5px dashed var(--border2);background:transparent;font-size:13px;color:var(--txt3);cursor:pointer;margin-bottom:1.2rem;font-family:inherit}
.neh{display:flex;justify-content:space-between;align-items:center;margin-bottom:.9rem}
#nt-ttl{border:none;outline:none;font-size:18px;font-weight:500;color:var(--txt);padding:0;margin-bottom:.7rem;border-radius:0;width:100%;background:transparent}
#nt-bdy{border:none;outline:none;font-size:13px;color:var(--txt2);padding:0;border-radius:0;min-height:180px;background:transparent}

/* calendar */
.cnr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.9rem}
.cnr span{font-size:14px;font-weight:500;color:var(--txt)}
.cnv{background:none;border:none;font-size:16px;cursor:pointer;color:var(--txt3);padding:4px 7px}
.cdow{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;margin-bottom:3px}
.cdow span{text-align:center;font-size:10px;color:var(--txt4);font-weight:500;padding:2px 0}
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px}
.cc{height:36px;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:7px;cursor:pointer;position:relative;font-size:13px;color:var(--txt)}
.cc:hover{background:var(--bg3)}
.cc.past{color:var(--txt4)}
.cc.today{background:var(--bg3);font-weight:500;color:var(--txt)}
.cc.sel{background:var(--accent)!important;color:var(--accent-fg)!important}
.cc.dot::after{content:'';width:3px;height:3px;border-radius:50%;background:currentColor;position:absolute;bottom:3px;opacity:.5}
.cc.sel.dot::after{background:var(--accent-fg);opacity:.8}
.cc.emp{cursor:default}.cc.emp:hover{background:transparent}
.evs{margin-top:1rem;border-top:.5px solid var(--border);padding-top:.9rem}
.edl{font-size:12px;color:var(--txt3);margin-bottom:9px}
.ef{display:flex;flex-direction:column;gap:6px;margin-bottom:.9rem}
.ef-r{display:flex;gap:6px}
.ef-r input,.ef-r select{flex:1;font-size:12px;padding:7px 8px}
.ef-r button{padding:7px 12px;border-radius:8px;border:none;background:var(--accent);color:var(--accent-fg);font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap}
.evi{display:flex;align-items:center;gap:7px;padding:8px 10px;border-radius:8px;border:.5px solid var(--border);margin-bottom:5px;background:var(--card)}
.ei2{flex:1;min-width:0}
.et2{font-size:13px;color:var(--txt)}
.em2{font-size:10px;color:var(--txt3);margin-top:1px}
.ebdg{display:inline-block;font-size:9px;background:var(--bg3);color:var(--txt3);border-radius:3px;padding:1px 4px;margin-left:3px}
.etbdg{background:#fff3e0;color:#b07}

/* hábitos */
.osc{background:#181818;border-radius:11px;color:#ccc;overflow:hidden;margin-bottom:.8rem;font-size:12px;line-height:1.65}
.ost{background:#0f0f0f;padding:10px 15px;font-size:11px;font-weight:500;color:#ddd;letter-spacing:.1em;text-align:center}
.oss{padding:8px 15px;border-top:.5px solid #242424}
.ossl{font-size:9px;color:#484848;font-weight:500;letter-spacing:.09em;text-transform:uppercase;margin-bottom:4px}
.osr{display:flex;align-items:baseline;padding:1px 0}
.osk{color:#484848;min-width:54px;flex-shrink:0;font-size:11px}
.osa{color:#303030;margin:0 5px;font-size:11px}
.beditroutine{width:100%;padding:8px;border-radius:8px;border:.5px solid var(--border2);background:transparent;font-size:12px;color:var(--txt3);cursor:pointer;margin-bottom:1rem;font-family:inherit}
.esec{background:var(--card);border:.5px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px}
.esec-hdr{display:flex;gap:6px;align-items:center;margin-bottom:8px}
.sec-title{font-size:13px;font-weight:500;flex:1;padding:6px 8px}
.eitems{display:flex;flex-direction:column;gap:5px;margin-bottom:7px}
.eitem{display:flex;gap:5px;align-items:center}
.einput{padding:6px 8px;border-radius:7px;border:.5px solid var(--border2);font-size:12px;outline:none;font-family:inherit;background:var(--bg3);color:var(--txt)}
.ek{width:68px;flex-shrink:0}.ev{flex:1}
.badd-item{background:none;border:.5px dashed var(--border2);border-radius:6px;padding:4px 8px;font-size:11px;color:var(--txt3);cursor:pointer;font-family:inherit;width:100%}
.badd-sec{width:100%;padding:8px;border-radius:8px;border:.5px dashed var(--border2);background:transparent;color:var(--txt3);font-size:12px;cursor:pointer;font-family:inherit;margin-bottom:10px}
.hab-save-row{display:flex;gap:8px;margin-top:4px;margin-bottom:1rem}
.smhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.smhdr h3{font-size:13px;font-weight:500;color:var(--txt)}
.sma{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:var(--card);border-radius:9px;border:.5px solid var(--border);margin-bottom:6px}
.sma-n{font-size:13px;color:var(--txt);flex:1;min-width:0;margin-right:8px}
.smd{display:flex;gap:5px;flex-shrink:0}
.smdot{width:27px;height:27px;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;filter:grayscale(1) opacity(.25);transition:filter .15s,transform .15s}
.smdot.sel{filter:none;transform:scale(1.15)}
.sml{display:flex;gap:10px;justify-content:center;margin-top:8px;font-size:11px;color:var(--txt3)}
.sm-ea{display:flex;gap:5px;align-items:center;margin-bottom:5px}
.sm-ea input{flex:1}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div class="hdr-l">
      <h1 id="app-name">Meu Organizador</h1>
      <p id="dlbl"></p>
    </div>
    <button class="gear-btn" onclick="openCfg()" title="Configurações">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <circle cx="9" cy="9" r="2.5" stroke="currentColor" stroke-width="1.2"/>
        <path d="M9 2v1.5M9 14.5V16M2 9h1.5M14.5 9H16M3.93 3.93l1.06 1.06M13.01 13.01l1.06 1.06M3.93 14.07l1.06-1.06M13.01 4.99l1.06-1.06" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <div class="content">
    <div id="sec-tasks" class="sec active">
      <div class="tf">
        <div class="row">
          <input type="text" id="task-in" placeholder="Nova tarefa..."/>
          <button class="ib" onclick="addTask()">+</button>
        </div>
        <div class="tf-r2">
          <input type="date" id="task-date"/>
          <input type="time" id="task-time"/>
          <select id="task-ntf">
            <option value="0">Sem aviso</option>
            <option value="5">5 min</option>
            <option value="10" selected>10 min</option>
            <option value="15">15 min</option>
            <option value="30">30 min</option>
            <option value="60">1 hora</option>
          </select>
        </div>
      </div>
      <div id="t-pend"></div>
      <div id="t-done" class="dg"></div>
    </div>

    <div id="sec-notes" class="sec">
      <div id="nlv">
        <button class="bnn" onclick="openNote('new')">+ Nova anotação</button>
        <div id="ngrid" class="ng"></div>
      </div>
      <div id="nev" style="display:none">
        <div class="neh">
          <button class="bbk" onclick="closeNote()">← Voltar</button>
          <button class="bsv" onclick="saveNote()">Salvar</button>
        </div>
        <input type="text" id="nt-ttl" placeholder="Título"/>
        <textarea id="nt-bdy" placeholder="Escreva sua nota..."></textarea>
      </div>
    </div>

    <div id="sec-agenda" class="sec">
      <div class="cnr">
        <button class="cnv" onclick="chMonth(-1)">‹</button>
        <span id="cal-ttl"></span>
        <button class="cnv" onclick="chMonth(1)">›</button>
      </div>
      <div class="cdow"><span>Dom</span><span>Seg</span><span>Ter</span><span>Qua</span><span>Qui</span><span>Sex</span><span>Sáb</span></div>
      <div id="cal-grid" class="cgrid"></div>
      <div id="ev-sec" class="evs" style="display:none">
        <p class="edl" id="ev-dlbl"></p>
        <div class="ef">
          <input type="text" id="ev-in" placeholder="Nome do evento..."/>
          <div class="ef-r">
            <input type="time" id="ev-time"/>
            <select id="ev-ntf">
              <option value="0">Sem aviso</option>
              <option value="5">5 min</option>
              <option value="10" selected>10 min</option>
              <option value="15">15 min</option>
              <option value="30">30 min</option>
              <option value="60">1h</option>
              <option value="120">2h</option>
            </select>
            <button onclick="addEvent()">+ Evento</button>
          </div>
        </div>
        <div id="ev-list"></div>
      </div>
    </div>

    <div id="sec-habitos" class="sec">
      <div id="hab-cont"></div>
      <div id="sem-cont"></div>
    </div>
  </div>

  <div class="tabbar">
    <button id="tb-tasks" class="tb active" onclick="swTab('tasks',this)">
      <svg viewBox="0 0 18 18" fill="none"><rect x="2" y="2" width="14" height="14" rx="3" stroke="currentColor" stroke-width="1.2"/><path d="M6 9l2 2 4-4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>Tarefas
    </button>
    <button id="tb-notes" class="tb" onclick="swTab('notes',this)">
      <svg viewBox="0 0 18 18" fill="none"><rect x="3" y="2" width="12" height="14" rx="2" stroke="currentColor" stroke-width="1.2"/><path d="M6 6h6M6 9h6M6 12h4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>Notas
    </button>
    <button id="tb-agenda" class="tb" onclick="swTab('agenda',this)">
      <svg viewBox="0 0 18 18" fill="none"><rect x="2" y="4" width="14" height="12" rx="2" stroke="currentColor" stroke-width="1.2"/><path d="M6 2v3M12 2v3M2 8h14" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>Agenda
    </button>
    <button id="tb-habitos" class="tb" onclick="swTab('habitos',this)">
      <svg viewBox="0 0 18 18" fill="none"><path d="M3 9a6 6 0 1 0 12 0A6 6 0 0 0 3 9zm6-3v3l2 2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>Hábitos
    </button>
  </div>
</div>

<!-- MODAL CONFIGURAÇÕES -->
<div class="modal-overlay" id="cfg-overlay" onclick="bgClose(event)">
  <div class="modal">
    <div class="modal-hdr">
      <h2>Configurações</h2>
      <button class="modal-close" onclick="closeCfg()">×</button>
    </div>

    <div class="cfg-section">
      <div class="cfg-section-title">Aparência</div>
      <div class="cfg-row">
        <div><div class="cfg-label">Tema escuro</div><div class="cfg-sub">Alterna entre claro e escuro</div></div>
        <label class="tog"><input type="checkbox" id="tog-dark" onchange="toggleTheme(this.checked)"/><span class="tog-sl"></span></label>
      </div>
    </div>

    <div class="cfg-section">
      <div class="cfg-section-title">Identidade</div>
      <div class="cfg-row" style="flex-direction:column;align-items:flex-start;gap:6px">
        <div class="cfg-label">Nome do app</div>
        <div class="cfg-name-row" style="width:100%">
          <input type="text" id="cfg-name-in" placeholder="Meu Organizador" maxlength="32" style="flex:1"/>
          <button class="bsv" onclick="saveName()">Salvar</button>
        </div>
      </div>
      <div class="cfg-row" style="flex-direction:column;align-items:flex-start;gap:6px">
        <div class="cfg-label">Saudação</div>
        <div class="cfg-name-row" style="width:100%">
          <input type="text" id="cfg-greet-in" placeholder="Ex: Olá, João!" maxlength="40" style="flex:1"/>
          <button class="bsv" onclick="saveGreet()">Salvar</button>
        </div>
      </div>
    </div>

    <div class="cfg-section">
      <div class="cfg-section-title">Notificações</div>
      <div class="cfg-row">
        <div>
          <div class="cfg-label">Permissão</div>
          <div class="cfg-sub" id="notif-desc">Necessária para avisos de eventos e tarefas</div>
        </div>
        <div class="cfg-right">
          <span class="notif-status" id="notif-status"></span>
          <button class="btn-notif-cfg" id="notif-action-btn" onclick="reqNotif()"></button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const MO=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const NOW=new Date(),TY=NOW.getFullYear(),TM=NOW.getMonth(),TD=NOW.getDate();

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── STORAGE ──────────────────────────────────────────
let tasks=[],notes=[],events={},sem={};
function load(){
  try{tasks=JSON.parse(localStorage.getItem('o_tasks'))||[];}catch(e){tasks=[];}
  try{notes=JSON.parse(localStorage.getItem('o_notes'))||[];}catch(e){notes=[];}
  try{events=JSON.parse(localStorage.getItem('o_events'))||{};}catch(e){events={};}
  try{sem=JSON.parse(localStorage.getItem('o_sem'))||{};}catch(e){sem={};}
}
function save(){
  localStorage.setItem('o_tasks',JSON.stringify(tasks));
  localStorage.setItem('o_notes',JSON.stringify(notes));
  localStorage.setItem('o_events',JSON.stringify(events));
  localStorage.setItem('o_sem',JSON.stringify(sem));
}

// ── CONFIGURAÇÕES ─────────────────────────────────────
let cfg={dark:false,name:'Meu Organizador',greet:''};
function loadCfg(){
  try{const c=JSON.parse(localStorage.getItem('o_cfg'));if(c)cfg={...cfg,...c};}catch(e){}
}
function saveCfg(){localStorage.setItem('o_cfg',JSON.stringify(cfg));}

function applyTheme(){

// ── NOTIFICAÇÕES ──────────────────────────────────────
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});

function updNotifUI(){
  const st=document.getElementById('notif-status');
  const btn=document.getElementById('notif-action-btn');
  const desc=document.getElementById('notif-desc');
  if(!('Notification' in window)){
    st.textContent='Não suportado';st.className='notif-status off';
    btn.style.display='none';return;
  }
  const p=Notification.permission;
  if(p==='granted'){
    st.textContent='● Ativas';st.className='notif-status on';
    btn.textContent='Desativar';btn.onclick=()=>{alert('Para desativar, vá em Configurações do Chrome → Notificações.');};
  } else if(p==='denied'){
    st.textContent='● Bloqueadas';st.className='notif-status off';
    btn.textContent='Ativar';desc.textContent='Ative nas configurações do Chrome';
    btn.onclick=()=>alert('Notificações bloqueadas. Vá em Configurações do Chrome → Notificações e permita este site.');
  } else {
    st.textContent='● Inativas';st.className='notif-status off';
    btn.textContent='Ativar';btn.onclick=reqNotif;
  }
}
function reqNotif(){
  if(!('Notification' in window)){alert('Navegador não suporta notificações.');return;}
  Notification.requestPermission().then(p=>{updNotifUI();if(p==='granted'){schedAll();showToast('Notificações ativadas ✓');}else alert('Permissão negada. Ative nas configurações do Chrome.');});
}
let fbT=[];
async function schedNotif(title,body,delay,tag){
  if(delay<=0)return;
  try{const reg=await navigator.serviceWorker.ready;if(reg.active){reg.active.postMessage({type:'NOTIFY',title,body,delay,tag});return;}}catch(e){}
  fbT.push(setTimeout(()=>{if(Notification.permission==='granted')new Notification(title,{body});},delay));
}
function schedAll(){
  fbT.forEach(t=>clearTimeout(t));fbT=[];
  if(Notification.permission!=='granted')return;
  navigator.serviceWorker.ready.then(r=>{if(r.active)r.active.postMessage({type:'CLEAR_ALL'});}).catch(()=>{});
  const nl=n=>n>=60?`${n/60}h`:`${n}min`;
  tasks.filter(t=>!t.done&&t.dk&&t.dt&&t.nb).forEach(t=>{
    const[y,m,d]=t.dk.split('-').map(Number);const[h,mi]=t.dt.split(':').map(Number);
    const delay=new Date(y,m,d,h,mi).getTime()-t.nb*60000-Date.now();
    if(delay>0)schedNotif('Meu Organizador',`✅ "${t.text}" — faltam ${nl(t.nb)}`,delay,`t-${t.id}`);
  });
  Object.keys(events).forEach(key=>{
    const[y,m,d]=key.split('-').map(Number);
    (events[key]||[]).forEach(ev=>{
      if(!ev.time||!ev.nb)return;
      const[h,mi]=ev.time.split(':').map(Number);
      const delay=new Date(y,m,d,h,mi).getTime()-ev.nb*60000-Date.now();
      if(delay>0)schedNotif('Meu Organizador',`📅 "${ev.text}" às ${ev.time} — faltam ${nl(ev.nb)}`,delay,`e-${ev.id}`);
    });
  });
}

// ── TOAST ─────────────────────────────────────────────
function showToast(msg){
  const t=document.createElement('div');
  t.style.cssText='position:fixed;bottom:84px;left:50%;transform:translateX(-50%);background:var(--accent);color:var(--accent-fg);padding:8px 18px;border-radius:20px;font-size:13px;z-index:999;white-space:nowrap;pointer-events:none;box-shadow:0 2px 12px rgba(0,0,0,.15)';
  t.textContent=msg;document.body.appendChild(t);
  setTimeout(()=>{t.style.transition='opacity .3s';t.style.opacity='0';setTimeout(()=>t.remove(),300);},2200);
}

// ── TASKS ─────────────────────────────────────────────
document.getElementById('task-in').addEventListener('keydown',e=>{if(e.key==='Enter')addTask();});
function d2k(s){if(!s)return null;const[y,m,d]=s.split('-').map(Number);return`${y}-${m-1}-${d}`;}
function fmtDt(dk,dt){
  if(!dk)return'';const[y,m,d]=dk.split('-').map(Number);
  const s=new Date(y,m,d).toLocaleDateString('pt-BR',{day:'numeric',month:'short'});
  return dt?`${s} · ${dt}`:s;
}
function isOv(dk,dt){
  if(!dk)return false;const[y,m,d]=dk.split('-').map(Number);
  if(dt){const[h,mi]=dt.split(':').map(Number);return new Date(y,m,d,h,mi)<NOW;}
  return new Date(y,m,d,23,59)<NOW;
}
function addTask(){
  const inp=document.getElementById('task-in'),text=inp.value.trim();if(!text)return;
  const dk=d2k(document.getElementById('task-date').value);
  const dt=document.getElementById('task-time').value||null;
  const nb=parseInt(document.getElementById('task-ntf').value)||0;
  tasks.unshift({id:Date.now(),text,done:false,dk,dt,nb});
  inp.value='';document.getElementById('task-date').value='';document.getElementById('task-time').value='';
  save();schedAll();renderTasks();renderCal();
}
function togTask(id){tasks=tasks.map(t=>t.id===id?{...t,done:!t.done}:t);save();renderTasks();}
function delTask(id){tasks=tasks.filter(t=>t.id!==id);save();schedAll();renderTasks();renderCal();}
function taskHTML(t){
  const meta=fmtDt(t.dk,t.dt),ov=!t.done&&isOv(t.dk,t.dt);
  return`<div class="ti">
    <div class="tck ${t.done?'done':''}" onclick="togTask(${t.id})">
      ${t.done?'<svg width="10" height="8" viewBox="0 0 10 8"><path d="M1 4l3 3 5-6" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>':''}
    </div>
    <div class="tb2">
      <div class="tt ${t.done?'done':''}">${esc(t.text)}</div>
      ${meta?`<div class="tm ${ov?'ov':''}">${ov?'⚠ ':'📅 '}${esc(meta)}</div>`:''}
    </div>
    <button class="bdel" onclick="delTask(${t.id})">×</button>
  </div>`;
}
function renderTasks(){
  const pend=tasks.filter(t=>!t.done).sort((a,b)=>{if(!a.dk&&!b.dk)return 0;if(!a.dk)return 1;if(!b.dk)return-1;return a.dk.localeCompare(b.dk);});
  const done=tasks.filter(t=>t.done);
  const pEl=document.getElementById('t-pend'),dEl=document.getElementById('t-done');
  if(!tasks.length){pEl.innerHTML='<p class="empty">Nenhuma tarefa ainda.</p>';dEl.innerHTML='';return;}
  pEl.innerHTML=pend.length?`<p class="lbl">Pendentes · ${pend.length}</p>`+pend.map(taskHTML).join(''):'';
  dEl.innerHTML=done.length?`<p class="lbl">Concluídas · ${done.length}</p>`+done.map(taskHTML).join(''):'';
}

// ── NOTES ─────────────────────────────────────────────
let enid=null;
function openNote(id){
  enid=id;const n=id==='new'?null:notes.find(n=>n.id===id);
  document.getElementById('nt-ttl').value=n?n.title:'';
  document.getElementById('nt-bdy').value=n?n.body:'';
  document.getElementById('nlv').style.display='none';
  document.getElementById('nev').style.display='block';
}
function closeNote(){document.getElementById('nlv').style.display='block';document.getElementById('nev').style.display='none';enid=null;}
function saveNote(){
  const title=document.getElementById('nt-ttl').value.trim()||'Sem título';
  const body=document.getElementById('nt-bdy').value.trim();
  if(enid==='new')notes.unshift({id:Date.now(),title,body,date:NOW.toLocaleDateString('pt-BR')});
  else notes=notes.map(n=>n.id===enid?{...n,title,body}:n);
  save();renderNotes();closeNote();
}
function delNote(id){notes=notes.filter(n=>n.id!==id);save();renderNotes();}
function renderNotes(){
  const g=document.getElementById('ngrid');
  if(!notes.length){g.innerHTML='<p class="empty" style="grid-column:1/-1">Nenhuma anotação ainda.</p>';return;}
  g.innerHTML=notes.map(n=>`<div class="nc" onclick="openNote(${n.id})">
    <h3>${esc(n.title)}</h3><p>${esc(n.body||'Sem conteúdo')}</p>
    <div class="nf"><span class="nd">${n.date}</span>
      <button class="bdel" onclick="event.stopPropagation();delNote(${n.id})">×</button>
    </div>
  </div>`).join('');
}

// ── CALENDAR ──────────────────────────────────────────
let cY=TY,cM=TM,selD=null;
function ck(d){return`${cY}-${cM}-${d}`;}
function chMonth(dir){
  cM+=dir;if(cM<0){cM=11;cY--;}if(cM>11){cM=0;cY++;}
  selD=null;document.getElementById('ev-sec').style.display='none';renderCal();
}
document.getElementById('ev-in').addEventListener('keydown',e=>{if(e.key==='Enter')addEvent();});
function addEvent(){
  const text=document.getElementById('ev-in').value.trim();if(!text||!selD)return;
  const time=document.getElementById('ev-time').value||null;
  const nb=parseInt(document.getElementById('ev-ntf').value)||0;
  const k=ck(selD);if(!events[k])events[k]=[];
  events[k].push({id:Date.now(),text,time,nb});
  document.getElementById('ev-in').value='';document.getElementById('ev-time').value='';
  save();schedAll();renderEvList();renderCal();
}
function delEvent(day,id){
  const k=ck(day);events[k]=(events[k]||[]).filter(e=>e.id!==id);
  save();schedAll();renderEvList();renderCal();
}
function selDay(d){
  selD=d;renderCal();
  document.getElementById('ev-sec').style.display='block';
  document.getElementById('ev-dlbl').textContent=new Date(cY,cM,d).toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  renderEvList();
}
function renderEvList(){
  const evs=(events[ck(selD)]||[]).slice().sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  const dkSel=`${cY}-${cM}-${selD}`;
  const dayTasks=tasks.filter(t=>t.dk===dkSel);
  const el=document.getElementById('ev-list');
  if(!evs.length&&!dayTasks.length){el.innerHTML='<p style="font-size:12px;color:var(--txt4)">Sem eventos ou tarefas neste dia.</p>';return;}
  const nl=n=>n>=60?`${n/60}h antes`:`${n}min antes`;
  const th=dayTasks.map(t=>`<div class="evi"><div class="ei2">
    <div class="et2">${esc(t.text)}<span class="ebdg etbdg">tarefa</span></div>
    ${t.dt?`<div class="em2">🕐 ${t.dt}</div>`:''}
  </div></div>`).join('');
  const eh=evs.map(ev=>`<div class="evi"><div class="ei2">
    <div class="et2">${esc(ev.text)}</div>
    <div class="em2">${ev.time?`🕐 ${ev.time}`:'Sem horário'}${ev.nb?`<span class="ebdg">🔔 ${nl(ev.nb)}</span>`:''}</div>
  </div><button class="bdel" onclick="delEvent(${selD},${ev.id})">×</button></div>`).join('');
  el.innerHTML=(dayTasks.length?`<p class="lbl" style="margin-bottom:5px">Tarefas</p>`+th:'')+
    (evs.length?`<p class="lbl" style="margin-top:${dayTasks.length?8:0}px;margin-bottom:5px">Eventos</p>`+eh:'');
}
function renderCal(){
  document.getElementById('cal-ttl').textContent=`${MO[cM]} ${cY}`;
  const fd=new Date(cY,cM,1).getDay(),dim=new Date(cY,cM+1,0).getDate();
  let h='';
  for(let i=0;i<fd;i++)h+='<div class="cc emp"></div>';
  for(let d=1;d<=dim;d++){
    const past=cY<TY||(cY===TY&&cM<TM)||(cY===TY&&cM===TM&&d<TD);
    const isT=d===TD&&cM===TM&&cY===TY,isSel=d===selD;
    const k=`${cY}-${cM}-${d}`;
    const hasDot=(events[k]||[]).length>0||tasks.some(t=>t.dk===k);
    const cls=['cc',past?'past':'',isT?'today':'',isSel?'sel':'',hasDot?'dot':''].filter(Boolean).join(' ');
    h+=`<div class="${cls}" onclick="selDay(${d})">${d}</div>`;
  }
  document.getElementById('cal-grid').innerHTML=h;
}

  {id:3,title:'Fins de semana',items:[{id:31,k:'Sáb manhã',v:'Revenda / Produto Digital'},{id:32,k:'Dom manhã',v:'Revisão semanal'}]},
  {id:4,title:'Rotas de renda',items:[{id:41,k:'Curto',v:'Revenda (Mercado Livre / Shopee)'},{id:42,k:'Médio',v:'Produto digital (planilha / curso)'},{id:43,k:'Longo',v:'LinkedIn + App próprio'}]},
  {id:5,title:'Regras',items:[{id:51,k:'',v:'Dias ruins → 15 min por área'},{id:52,k:'',v:'Revisão mensal → 1ª dom do mês · 15 min'}]}
];
const DEF_AREAS=['Rotina manhã','BI / Excel','IA / Prog / Revenda','Direito','Revenda / Shopee','Produto digital','LinkedIn / App'];
let habitos=[],smAreas=[],editHab=false,editAreas=false;
function loadHab(){
  try{habitos=JSON.parse(localStorage.getItem('o_hab'));}catch(e){habitos=null;}
  if(!habitos||!habitos.length)habitos=JSON.parse(JSON.stringify(DEF_HAB));
  try{smAreas=JSON.parse(localStorage.getItem('o_areas'));}catch(e){smAreas=null;}
  if(!smAreas||!smAreas.length)smAreas=[...DEF_AREAS];
}
function saveHabData(){localStorage.setItem('o_hab',JSON.stringify(habitos));localStorage.setItem('o_areas',JSON.stringify(smAreas));}
function renderHabitos(){
  const c=document.getElementById('hab-cont');
  if(!editHab){
    c.innerHTML=`<div class="osc">
      <div class="ost">MEU SISTEMA OPERACIONAL DE VIDA</div>
      ${habitos.map(s=>`<div class="oss"><div class="ossl">${esc(s.title)}</div>
        ${s.items.map(i=>i.k
          ?`<div class="osr"><span class="osk">${esc(i.k)}</span><span class="osa">→</span><span>${esc(i.v)}</span></div>`
          :`<div class="osr"><span>${esc(i.v)}</span></div>`
        ).join('')}</div>`).join('')}
    </div>
    <button class="beditroutine" onclick="editHab=true;renderHabitos()">✏ Editar rotina</button>`;
  } else {
    c.innerHTML=`<div id="esecs">
      ${habitos.map(s=>`<div class="esec">
        <div class="esec-hdr">
          <input class="einput sec-title" value="${esc(s.title)}" placeholder="Nome da seção" style="flex:1"/>
          <button class="bdel" onclick="this.closest('.esec').remove()">×</button>
        </div>
        <div class="eitems">
          ${s.items.map(i=>`<div class="eitem">
            <input class="einput ek" value="${esc(i.k)}" placeholder="Rótulo"/>
            <input class="einput ev" value="${esc(i.v)}" placeholder="Descrição"/>
            <button class="bdel" onclick="this.closest('.eitem').remove()">×</button>
          </div>`).join('')}
        </div>
        <button class="badd-item" onclick="addItm(this)">+ item</button>
      </div>`).join('')}
    </div>
    <button class="badd-sec" onclick="addSc()">+ Nova seção</button>
    <div class="hab-save-row">
      <button class="bbk" style="flex:1" onclick="editHab=false;renderHabitos()">Cancelar</button>
      <button class="bsv" style="flex:1" onclick="saveHab()">Salvar rotina</button>
    </div>`;
  }
}
function addItm(btn){
  const d=document.createElement('div');d.className='eitem';
  d.innerHTML=`<input class="einput ek" placeholder="Rótulo"/><input class="einput ev" placeholder="Descrição"/><button class="bdel" onclick="this.closest('.eitem').remove()">×</button>`;
  btn.previousElementSibling.appendChild(d);
}
function addSc(){
  const d=document.createElement('div');d.className='esec';
  d.innerHTML=`<div class="esec-hdr"><input class="einput sec-title" placeholder="Nome da seção" style="flex:1"/><button class="bdel" onclick="this.closest('.esec').remove()">×</button></div>
  <div class="eitems"></div><button class="badd-item" onclick="addItm(this)">+ item</button>`;
  document.getElementById('esecs').appendChild(d);
}
function saveHab(){
  habitos=Array.from(document.querySelectorAll('.esec')).map((sec,si)=>({
    id:Date.now()+si,title:sec.querySelector('.sec-title').value.trim()||'Seção',
    items:Array.from(sec.querySelectorAll('.eitem')).map((it,ii)=>({
      id:Date.now()+si*100+ii,k:it.querySelector('.ek').value.trim(),v:it.querySelector('.ev').value.trim()
    })).filter(i=>i.v)
  })).filter(s=>s.items.length);
  editHab=false;saveHabData();renderHabitos();showToast('Rotina salva ✓');
}

// ── SEMÁFORO ──────────────────────────────────────────
function wkKey(){
  const d=new Date(),s=new Date(d.getFullYear(),0,1);
  const w=Math.ceil(((d-s)/86400000+s.getDay()+1)/7);
  return`${d.getFullYear()}-S${String(w).padStart(2,'0')}`;
}
function setSem(idx,state){
  const area=smAreas[idx];if(area===undefined)return;
  const wk=wkKey();if(!sem[wk])sem[wk]={};
  sem[wk][area]=sem[wk][area]===state?null:state;
  save();renderSem();
}
function toggleEditAreas(){editAreas=!editAreas;if(!editAreas)saveHabData();renderSem();}
function renderSem(){
  const wk=wkKey(),wd=sem[wk]||{};
  const rows=editAreas
    ? smAreas.map((a,i)=>`<div class="sm-ea">
        <input class="einput" value="${esc(a)}" placeholder="Área" style="flex:1" onchange="smAreas[${i}]=this.value"/>
        <button class="bdel" onclick="smAreas.splice(${i},1);saveHabData();renderSem()">×</button>
      </div>`).join('')+`<button class="badd-item" style="margin-bottom:8px" onclick="smAreas.push('Nova área');saveHabData();renderSem()">+ área</button>`
    : smAreas.map((a,i)=>`<div class="sma">
        <span class="sma-n">${esc(a)}</span>
        <div class="smd">
          <div class="smdot ${wd[a]==='g'?'sel':''}" onclick="setSem(${i},'g')">🟢</div>
          <div class="smdot ${wd[a]==='y'?'sel':''}" onclick="setSem(${i},'y')">🟡</div>
          <div class="smdot ${wd[a]==='r'?'sel':''}" onclick="setSem(${i},'r')">🔴</div>
        </div>
      </div>`).join('');
  document.getElementById('sem-cont').innerHTML=`
    <div class="smhdr">
      <h3>Semáforo da semana</h3>
      <div style="display:flex;gap:6px;align-items:center">
        <span style="font-size:10px;color:var(--txt4)">${wk}</span>
        <button class="bbk" style="font-size:10px;padding:4px 9px" onclick="toggleEditAreas()">${editAreas?'✓ Salvar':'✏ Editar'}</button>
      </div>
    </div>
    ${rows}
    <div class="sml"><span>🟢 Avancei</span><span>🟡 Mantive</span><span>🔴 Regredi</span></div>`;
}
