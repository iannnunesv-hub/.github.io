
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
<meta name="theme-color" content="#fff"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<link rel="manifest" href="./manifest.json"/>
<title>Meu Organizador</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fafafa;--bg2:#fff;--bg3:#f5f5f5;--bg4:#e8e8e8;--brd:#eee;--brd2:#ddd;--txt:#222;--txt2:#666;--txt3:#aaa;--txt4:#ccc;--ac:#222;--acfg:#fff;--card:#fff;--inp:#fff;--hol:#e05;}
[data-theme=dark]{--bg:#111;--bg2:#1a1a1a;--bg3:#252525;--bg4:#0d0d0d;--brd:#2a2a2a;--brd2:#383838;--txt:#eee;--txt2:#aaa;--txt3:#666;--txt4:#444;--ac:#e0e0e0;--acfg:#111;--card:#1e1e1e;--inp:#2a2a2a;--hol:#ff6b8a;}
body{font-family:system-ui,sans-serif;background:var(--bg4);display:flex;justify-content:center;min-height:100vh;padding:.6rem;transition:background .2s}
#app{width:100%;max-width:490px;background:var(--bg);border-radius:18px;border:.5px solid var(--brd);overflow:hidden;display:flex;flex-direction:column;min-height:96vh}
.hdr{background:var(--bg2);border-bottom:.5px solid var(--brd);padding:14px 17px 11px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.hdr h1{font-size:18px;font-weight:500;color:var(--txt)}
.hdr p{font-size:12px;color:var(--txt3);margin-top:2px}
.gear-btn{background:none;border:.5px solid var(--brd2);border-radius:9px;padding:7px;cursor:pointer;display:flex;align-items:center;color:var(--txt2)}
.cnt{flex:1;overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;position:relative}
.sec{display:none;padding:1.2rem 1.1rem;flex:1;flex-direction:column}
.sec.active{display:flex}
.tabbar{display:flex;border-top:.5px solid var(--brd);background:var(--bg2);flex-shrink:0}
.tb{flex:1;padding:11px 2px 9px;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--txt4);font-size:11px;font-family:inherit;transition:color .15s}
.tb.active{color:var(--txt);font-weight:500}
.tb svg{width:18px;height:18px}
input,textarea,select{padding:9px 12px;border-radius:9px;border:.5px solid var(--brd2);font-size:14px;outline:none;font-family:inherit;background:var(--inp);color:var(--txt)}
textarea{resize:none;line-height:1.65;width:100%}
.ib{padding:9px 15px;border-radius:9px;border:none;background:var(--ac);color:var(--acfg);font-size:18px;cursor:pointer;flex-shrink:0}
.bd{background:none;border:none;cursor:pointer;color:var(--txt4);font-size:16px;padding:0 4px;flex-shrink:0}
.lbl{font-size:11px;color:var(--txt3);margin-bottom:5px;font-weight:500;letter-spacing:.07em;text-transform:uppercase}
.empty{text-align:center;color:var(--txt4);font-size:14px;margin-top:2rem}
.bbk{background:none;border:.5px solid var(--brd2);border-radius:9px;padding:7px 12px;cursor:pointer;font-size:13px;color:var(--txt2);font-family:inherit}
.bsv{background:var(--ac);color:var(--acfg);border:none;border-radius:9px;padding:7px 14px;font-size:13px;cursor:pointer;font-family:inherit}
/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.mo.open{opacity:1;pointer-events:all}
.md{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-width:490px;max-height:90vh;display:flex;flex-direction:column;transform:translateY(30px);transition:transform .25s}
.mo.open .md{transform:translateY(0)}
.mh{display:flex;justify-content:space-between;align-items:center;padding:16px 19px 13px;border-bottom:.5px solid var(--brd);flex-shrink:0}
.mh h2{font-size:15px;font-weight:500;color:var(--txt)}
.mc{background:none;border:none;font-size:23px;cursor:pointer;color:var(--txt3);line-height:1}
.mb{overflow-y:auto;flex:1;padding:14px 19px}
.mf{padding:12px 19px 20px;flex-shrink:0;border-top:.5px solid var(--brd)}
/* SETTINGS */
.cst{font-size:11px;color:var(--txt3);font-weight:500;letter-spacing:.08em;text-transform:uppercase;margin:15px 0 9px}
.cst:first-child{margin-top:0}
.cr{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:.5px solid var(--brd)}
.cr:last-child{border-bottom:none}
.cl{font-size:14px;color:var(--txt)}
.tog{position:relative;width:44px;height:24px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0;position:absolute}
.tog-s{position:absolute;inset:0;background:var(--brd2);border-radius:24px;cursor:pointer;transition:background .2s}
.tog-s::before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:transform .2s}
.tog input:checked+.tog-s{background:#555}
.tog input:checked+.tog-s::before{transform:translateX(20px)}
.ns{font-size:12px;font-weight:500}.ns.on{color:#3a3}.ns.off{color:var(--txt3)}
.bncfg{background:var(--ac);color:var(--acfg);border:none;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;font-family:inherit}
/* TASKS */
.tf{background:var(--card);border-radius:13px;border:.5px solid var(--brd);padding:13px;margin-bottom:1rem;flex-shrink:0}
.tftop{display:flex;gap:7px;margin-bottom:10px}
.tftop input{flex:1}
.tf2{display:flex;gap:6px;flex-wrap:wrap}
.tff{display:flex;flex-direction:column;gap:3px;flex:1;min-width:74px}
.tff label{font-size:10px;color:var(--txt3);font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.tff input,.tff select{font-size:12px;padding:7px 8px}
.ti{display:flex;align-items:flex-start;gap:9px;padding:11px 13px;border-radius:10px;border:.5px solid var(--brd);margin-bottom:6px;background:var(--card)}
.ti.done-item .tt{text-decoration:line-through;color:var(--txt4)}
.tck{width:19px;height:19px;border-radius:50%;border:1.5px solid var(--txt4);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:2px;transition:all .15s}
.tck.done{background:var(--ac);border-color:var(--ac)}
.tb2{flex:1;min-width:0}
.tt{font-size:14px;color:var(--txt);line-height:1.4}
.tm{font-size:11px;color:var(--txt3);margin-top:2px}
.tm.ov{color:#e44}
.dtb{display:flex;gap:1px;flex-shrink:0}
.brev{background:none;border:none;cursor:pointer;font-size:14px;padding:3px 5px;color:var(--txt3)}
.bperm{background:none;border:none;cursor:pointer;font-size:14px;padding:3px 5px;color:#e44}
.dtoggle{width:100%;padding:10px 13px;border-radius:10px;border:.5px solid var(--brd);background:var(--card);text-align:left;color:var(--txt3);font-size:13px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:7px;margin-top:.8rem;flex-shrink:0}
.dtoggle .arr{margin-left:auto;transition:transform .2s;font-size:14px}
.dtoggle.open .arr{transform:rotate(90deg)}
/* NOTES */
.ng{display:grid;grid-template-columns:1fr 1fr;gap:9px;flex:1;align-content:start}
.nc{border-radius:11px;border:.5px solid var(--brd);padding:13px;cursor:pointer;background:var(--card)}
.nc h3{font-size:14px;font-weight:500;color:var(--txt);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nc p{font-size:12px;color:var(--txt3);margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.nf{display:flex;justify-content:space-between;align-items:center}
.nd{font-size:10px;color:var(--txt4)}
.bnn{width:100%;padding:11px;border-radius:10px;border:.5px dashed var(--brd2);background:transparent;font-size:14px;color:var(--txt3);cursor:pointer;margin-bottom:1rem;font-family:inherit;flex-shrink:0}
#nlv{flex:1;display:flex;flex-direction:column;min-height:0;overflow-y:auto}
.neh{display:flex;justify-content:space-between;align-items:center;margin-bottom:.7rem;flex-shrink:0}
#nt-ttl{border:none;outline:none;font-size:18px;font-weight:500;color:var(--txt);padding:0;margin-bottom:.6rem;border-radius:0;width:100%;background:transparent;flex-shrink:0}
#nt-bdy{border:none;outline:none;font-size:14px;color:var(--txt2);padding:0;border-radius:0;background:transparent;flex:1;min-height:0;height:calc(100svh - 240px)}
#nev{flex:1;display:none;flex-direction:column;overflow:hidden}
#nev.open{display:flex}
/* CALENDAR */
.vrow{display:flex;gap:6px;margin-bottom:.8rem;flex-shrink:0}
.vbtn{flex:1;padding:7px;border-radius:8px;border:.5px solid var(--brd2);background:var(--bg3);color:var(--txt2);font-size:12px;cursor:pointer;font-family:inherit}
.vbtn.sel{background:var(--ac);color:var(--acfg);border-color:var(--ac)}
.srow{display:flex;gap:7px;margin-bottom:.8rem;flex-shrink:0}
.srow input{flex:1;font-size:13px}
.sri{padding:9px 11px;border-radius:9px;border:.5px solid var(--brd);margin-bottom:5px;background:var(--card);cursor:pointer}
.sri-t{font-size:13px;color:var(--txt)}
.sri-m{font-size:11px;color:var(--txt3);margin-top:2px}
.cnr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.8rem}
.cnr span{font-size:14px;font-weight:500;color:var(--txt)}
.cnv{background:none;border:none;font-size:18px;cursor:pointer;color:var(--txt3);padding:4px 8px}
.cdow{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;margin-bottom:3px}
.cdow span{text-align:center;font-size:10px;color:var(--txt4);font-weight:500}
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cc{height:36px;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:7px;cursor:pointer;position:relative;font-size:13px;color:var(--txt)}
.cc:hover{background:var(--bg3)}
.cc.past{color:var(--txt4)}
.cc.today{background:var(--bg3);font-weight:600}
.cc.sel{background:var(--ac)!important;color:var(--acfg)!important}
.cc.dot::after{content:'';width:3px;height:3px;border-radius:50%;background:currentColor;position:absolute;bottom:3px;opacity:.5}
.cc.sel.dot::after{background:var(--acfg);opacity:.8}
.cc.emp{cursor:default}.cc.emp:hover{background:transparent}
.cc.hol{color:var(--hol)}.cc.sel.hol{color:var(--acfg)}
.evs{margin-top:.8rem;border-top:.5px solid var(--brd);padding-top:.8rem;flex-shrink:0}
.edl{font-size:12px;color:var(--txt3);margin-bottom:8px}
.holbanner{background:rgba(200,0,50,.08);border:.5px solid rgba(200,0,50,.2);border-radius:8px;padding:6px 10px;margin-bottom:8px;font-size:12px;color:var(--hol);display:flex;align-items:center;gap:5px}
.ef{display:flex;flex-direction:column;gap:6px;margin-bottom:.8rem}
.efr{display:flex;gap:6px;align-items:flex-end}
.efl{display:flex;flex-direction:column;gap:3px;flex:1}
.efl label{font-size:10px;color:var(--txt3);font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.efr input,.efr select{font-size:12px;padding:7px 8px}
.efr button{padding:8px 11px;border-radius:8px;border:none;background:var(--ac);color:var(--acfg);font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0}
.evi{display:flex;align-items:center;gap:8px;padding:9px 11px;border-radius:9px;border:.5px solid var(--brd);margin-bottom:5px;background:var(--card)}
.evi.done-ev .et2{text-decoration:line-through;color:var(--txt4)}
.ei2{flex:1;min-width:0}
.et2{font-size:13px;color:var(--txt)}
.em2{font-size:11px;color:var(--txt3);margin-top:2px}
.ebdg{display:inline-block;font-size:10px;background:var(--bg3);color:var(--txt3);border-radius:3px;padding:1px 5px;margin-left:4px}
.etask{background:#fff3e0;color:#b07}
.eev{background:#e8f4ff;color:#46a}
/* WEEK/DAY */
.wstrip{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:.8rem}
.wd{display:flex;flex-direction:column;align-items:center;padding:6px 2px;border-radius:9px;cursor:pointer;position:relative}
.wd:hover{background:var(--bg3)}
.wd.sel{background:var(--ac)}
.wd.sel .wdn,.wd.sel .wdd{color:var(--acfg)}
.wd.today .wdd{font-weight:700}
.wdn{font-size:10px;color:var(--txt4);margin-bottom:2px;font-weight:500}
.wdd{font-size:14px;color:var(--txt)}
.wd.past .wdd{color:var(--txt4)}
.wd.dot::after{content:'';width:3px;height:3px;border-radius:50%;background:var(--ac);position:absolute;bottom:3px;opacity:.6}
.wd.sel.dot::after{background:var(--acfg)}
.wd.hol .wdd{color:var(--hol)}
.dtl{display:flex;flex-direction:column;gap:5px}
.dti{display:flex;gap:9px;align-items:flex-start;padding:9px 11px;border-radius:9px;border:.5px solid var(--brd);background:var(--card)}
.dtt{font-size:11px;color:var(--txt3);min-width:36px;flex-shrink:0;margin-top:2px}
.dtb2{flex:1;min-width:0}
.dttl{font-size:13px;color:var(--txt)}
.dttl.done{text-decoration:line-through;color:var(--txt4)}
/* HABITS */
.hprog{background:var(--card);border-radius:13px;border:.5px solid var(--brd);padding:13px 14px;margin-bottom:.9rem;flex-shrink:0}
.hph{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.hph span{font-size:13px;color:var(--txt2);font-weight:500}
.pbw{background:var(--bg3);border-radius:99px;height:7px;overflow:hidden}
.pbf{height:100%;border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.pbm{font-size:12px;color:var(--txt3);margin-top:6px;text-align:center}
.hcard{background:var(--card);border-radius:13px;border:.5px solid var(--brd);margin-bottom:10px;overflow:hidden;flex-shrink:0;transition:transform .1s}
.hcard:active{transform:scale(.985)}
.hcbar{height:4px}
.hcbody{padding:12px 14px}
.hctop{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.hico{font-size:20px;flex-shrink:0;line-height:1}
.hnm{flex:1;font-size:14px;font-weight:500;color:var(--txt);line-height:1.3;cursor:pointer}
.hcm{display:flex;align-items:center;gap:5px;flex-shrink:0}
.hstr{font-size:13px;color:var(--txt2);font-weight:600}
.hedit{background:none;border:none;cursor:pointer;font-size:12px;color:var(--txt4);padding:3px 4px}
.hdelbtn{background:none;border:.5px solid #e4444433;border-radius:6px;cursor:pointer;font-size:13px;padding:3px 6px;color:#e44;line-height:1}
.hbub{display:flex;gap:6px;flex-wrap:wrap;align-items:flex-end}
.bub{border-radius:50%;border:2.5px solid currentColor;cursor:pointer;transition:background .15s,transform .1s;flex-shrink:0;position:relative}
.bub:active{transform:scale(.85)}
.bub:not(.filled){animation:bubpulse 2.8s ease-in-out infinite}
@keyframes bubpulse{0%,100%{box-shadow:0 0 0 0 rgba(100,100,200,0)}50%{box-shadow:0 0 0 4px rgba(100,100,200,.13)}}
.bub.filled{background:currentColor;animation:none}
.bsm{width:28px;height:28px}.blg{width:38px;height:38px}
.htl{font-size:9px;color:var(--txt4);text-align:center;margin-top:2px}
.hbwrap{display:flex;flex-direction:column;align-items:center;gap:1px}
.hpc{font-size:12px;color:var(--txt3);margin-left:4px}
.hct{font-size:12px;font-weight:500;margin-left:4px}
.huns{opacity:.5}
.hnt{font-size:11px;color:var(--txt4);font-style:italic;margin-top:5px}
.bubtip{font-size:10px;color:var(--txt4);margin-left:4px;font-style:italic}
/* HABIT FORM */
.hff{margin-bottom:13px}
.hff label{display:block;font-size:11px;color:var(--txt3);font-weight:500;letter-spacing:.07em;text-transform:uppercase;margin-bottom:5px}
.hff input[type=text],.hff input[type=time],.hff select{width:100%}
.csw-row{display:flex;gap:7px;flex-wrap:wrap}
.csw{width:29px;height:29px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform .1s}
.csw.sel{border-color:var(--txt);transform:scale(1.12)}
.frow{display:flex;gap:6px;flex-wrap:wrap}
.fbtn{padding:6px 12px;border-radius:99px;border:.5px solid var(--brd2);font-size:13px;cursor:pointer;background:var(--bg3);color:var(--txt2);font-family:inherit}
.fbtn.sel{background:var(--ac);color:var(--acfg);border-color:var(--ac)}
.drow{display:flex;gap:5px;margin-top:8px}
.dck{width:33px;height:33px;border-radius:50%;border:.5px solid var(--brd2);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;background:var(--bg3);color:var(--txt2);font-family:inherit;flex-shrink:0}
.dck.sel{background:var(--ac);color:var(--acfg)}
.tst{display:flex;align-items:center;gap:11px}
.tsb{width:32px;height:32px;border-radius:50%;border:.5px solid var(--brd2);background:var(--bg3);color:var(--txt);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;flex-shrink:0}
.tsv{font-size:18px;font-weight:500;color:var(--txt);min-width:18px;text-align:center}
.tsl{font-size:12px;color:var(--txt3)}
.htgrid{display:flex;flex-direction:column;gap:6px;margin-top:5px}
.htrow{display:flex;align-items:center;gap:9px;padding:6px 10px;background:var(--bg3);border-radius:8px}
.htrow span{font-size:12px;color:var(--txt2);flex-shrink:0;min-width:80px}
.htrow input{flex:1}
/* FOCUS */
.fbubs{display:flex;gap:9px;justify-content:center;flex-wrap:wrap;margin:12px 0 5px}
.fbub{width:40px;height:40px;border-radius:50%;border:2.5px solid currentColor;cursor:pointer;transition:background .15s}
.fbub:active{transform:scale(.88)}
.fbub.filled{background:currentColor}
.fcnt{text-align:center;font-size:13px;color:var(--txt3);margin-bottom:12px}
.fsts{display:flex;justify-content:center;gap:22px;margin-bottom:10px}
.fs{text-align:center}
.fsn{font-size:22px;font-weight:500;color:var(--txt)}
.fsl{font-size:11px;color:var(--txt3);margin-top:1px}
.fq{text-align:center;font-size:13px;color:var(--txt3);font-style:italic;padding:0 8px;margin:10px 0}
.hgs{margin:10px 0}
.hdow{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:3px}
.hdow span{text-align:center;font-size:10px;color:var(--txt4)}
.hgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.hcl{aspect-ratio:1;border-radius:4px;background:var(--bg3)}
.hcl.done{opacity:.85}
.hcl.today{box-shadow:0 0 0 1.5px var(--txt)}
.tmrsec{margin-top:12px;padding-top:12px;border-top:.5px solid var(--brd);text-align:center}
.topts{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:8px}
.topt{padding:6px 11px;border-radius:99px;border:.5px solid var(--brd2);font-size:12px;cursor:pointer;background:var(--bg3);color:var(--txt2);font-family:inherit}
.topt.sel{background:var(--ac);color:var(--acfg)}
.tcrow{display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:8px}
.tcrow input{width:68px;text-align:center;font-size:14px;padding:6px 8px}
.tdisp{font-size:44px;font-weight:200;color:var(--txt);letter-spacing:.04em;margin:4px 0 9px;font-variant-numeric:tabular-nums}
.tbtn{padding:10px 28px;border-radius:99px;border:none;background:var(--ac);color:var(--acfg);font-size:14px;cursor:pointer;font-family:inherit}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div><h1 id="aname">Meu Organizador</h1><p id="dlbl"></p></div>
    <button class="gear-btn" onclick="openCfg()" title="Configurações">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>
  <div class="cnt" id="cnt">
    <!-- TAREFAS -->
    <div id="sec-tasks" class="sec active">
      <div class="tf">
        <div class="tftop"><input type="text" id="task-in" placeholder="Nova tarefa..."/><button class="ib" onclick="addTask()">+</button></div>
        <div class="tf2">
          <div class="tff"><label>Dia</label><input type="date" id="task-date"/></div>
          <div class="tff"><label>Hora</label><input type="time" id="task-time"/></div>
          <div class="tff"><label>Notificar</label>
            <select id="task-ntf">
              <option value="0">Sem aviso</option><option value="5">5 min</option>
              <option value="10" selected>10 min</option><option value="15">15 min</option>
              <option value="30">30 min</option><option value="60">1 hora</option>
            </select>
          </div>
        </div>
      </div>
      <div id="t-pend" style="overflow-y:auto;flex:1"></div>
      <div id="t-done-wrap"></div>
    </div>
    <!-- AGENDA -->
    <div id="sec-agenda" class="sec">
      <div class="vrow">
        <button class="vbtn sel" id="vbtn-month" onclick="setView('month')">Mês</button>
        <button class="vbtn" id="vbtn-week" onclick="setView('week')">Semana</button>
        <button class="vbtn" id="vbtn-day" onclick="setView('day')">Dia</button>
      </div>
      <div class="srow"><input type="text" id="cal-srch" placeholder="🔍 Buscar tarefas e eventos..." oninput="renderSearch()"/></div>
      <div id="srch-res" style="display:none"></div>
      <div id="cal-main" style="flex-shrink:0"></div>
      <div id="ev-sec" class="evs" style="display:none">
        <p class="edl" id="ev-dlbl"></p>
        <div id="hol-row" style="display:none" class="holbanner">🎉 <span id="hol-nm"></span></div>
        <div class="ef">
          <input type="text" id="ev-in" placeholder="Nome do evento..."/>
          <div class="efr">
            <div class="efl"><label>Hora</label><input type="time" id="ev-time"/></div>
            <div class="efl"><label>Notificar</label>
              <select id="ev-ntf">
                <option value="0">Sem aviso</option><option value="5">5 min</option>
                <option value="10" selected>10 min</option><option value="15">15 min</option>
                <option value="30">30 min</option><option value="60">1h</option><option value="120">2h</option>
              </select>
            </div>
            <button onclick="addEvent()" style="margin-bottom:1px">+ Evento</button>
          </div>
        </div>
        <div id="ev-list" style="overflow-y:auto;max-height:35vh"></div>
      </div>
    </div>
    <!-- NOTAS -->
    <div id="sec-notes" class="sec">
      <div id="nlv"><button class="bnn" onclick="openNote('new')">+ Nova anotação</button><div id="ngrid" class="ng"></div></div>
      <div id="nev">
        <div class="neh"><button class="bbk" onclick="closeNote()">← Voltar</button><button class="bsv" onclick="saveNote()">Salvar</button></div>
        <input type="text" id="nt-ttl" placeholder="Título"/>
        <textarea id="nt-bdy" placeholder="Escreva sua nota..."></textarea>
      </div>
    </div>
    <!-- HÁBITOS -->
    <div id="sec-habitos" class="sec"><div id="hab-list" style="flex:1;overflow-y:auto"></div></div>
  </div>
  <div class="tabbar">
    <button id="tb-tasks" class="tb active" onclick="swTab('tasks',this)"><svg viewBox="0 0 18 18" fill="none"><rect x="2" y="2" width="14" height="14" rx="3" stroke="currentColor" stroke-width="1.3"/><path d="M6 9l2 2 4-4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>Tarefas</button>
    <button id="tb-agenda" class="tb" onclick="swTab('agenda',this)"><svg viewBox="0 0 18 18" fill="none"><rect x="2" y="4" width="14" height="12" rx="2" stroke="currentColor" stroke-width="1.3"/><path d="M6 2v3M12 2v3M2 8h14" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>Agenda</button>
    <button id="tb-notes" class="tb" onclick="swTab('notes',this)"><svg viewBox="0 0 18 18" fill="none"><rect x="3" y="2" width="12" height="14" rx="2" stroke="currentColor" stroke-width="1.3"/><path d="M6 6h6M6 9h6M6 12h4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>Notas</button>
    <button id="tb-habitos" class="tb" onclick="swTab('habitos',this)"><svg viewBox="0 0 18 18" fill="none"><path d="M9 3a6 6 0 1 1 0 12A6 6 0 0 1 9 3zm0 2v4l2.5 2.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>Hábitos</button>
  </div>
</div>

<!-- MODALS -->
<div class="mo" id="mo-cfg" onclick="bgC(event,'mo-cfg')"><div class="md">
  <div class="mh"><h2>Configurações</h2><button class="mc" onclick="closeCfg()">×</button></div>
  <div class="mb">
    <div class="cst">Aparência</div>
    <div class="cr"><div class="cl">Tema escuro</div><label class="tog"><input type="checkbox" id="tog-dark" onchange="toggleTheme(this.checked)"/><span class="tog-s"></span></label></div>
    <div class="cst">Identidade</div>
    <div class="cr" style="flex-direction:column;align-items:flex-start;gap:8px">
      <div class="cl">Nome do app</div>
      <div style="display:flex;gap:8px;width:100%"><input type="text" id="cfg-name" placeholder="Meu Organizador" maxlength="32" style="flex:1"/><button class="bsv" onclick="saveName()">Salvar</button></div>
    </div>
    <div class="cr" style="flex-direction:column;align-items:flex-start;gap:8px;border-bottom:none">
      <div class="cl">Saudação</div>
      <div style="display:flex;gap:8px;width:100%"><input type="text" id="cfg-greet" placeholder="Ex: Olá, João!" maxlength="40" style="flex:1"/><button class="bsv" onclick="saveGreet()">Salvar</button></div>
    </div>
    <div class="cst">Notificações</div>
    <div class="cr" style="border-bottom:none">
      <div><div class="cl">Permissão</div><div style="font-size:12px;color:var(--txt3);margin-top:2px">Para hábitos, tarefas e eventos</div></div>
      <div style="display:flex;align-items:center;gap:8px"><span class="ns" id="nst"></span><button class="bncfg" id="nbtn"></button></div>
    </div>
  </div>
</div></div>

<div class="mo" id="mo-hf" onclick="bgC(event,'mo-hf')"><div class="md">
  <div class="mh"><h2 id="hf-ttl">Novo hábito</h2><button class="mc" onclick="closeHF()">×</button></div>
  <div class="mb" id="hf-body"></div>
  <div class="mf"><button class="bsv" style="width:100%;padding:13px;font-size:14px" onclick="saveHabit()">Salvar hábito</button></div>
</div></div>

<div class="mo" id="mo-focus" onclick="bgC(event,'mo-focus')"><div class="md">
  <div class="mh"><h2 id="fc-ttl">Foco</h2><div style="display:flex;gap:8px"><button class="bbk" style="font-size:12px;padding:5px 10px" onclick="editFromFocus()">✏</button><button class="mc" onclick="closeFocus()">×</button></div></div>
  <div class="mb" id="fc-body"></div>
</div></div>

<script>
// --- CONSTANTES E DADOS ---
const MO=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DL=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const COLORS=['#FF6B6B','#FF9F43','#FECA57','#1DD1A1','#48DBFB','#54A0FF','#A29BFE','#FF9FF3'];
const QUOTES=['Disciplina é liberdade.','Um dia de cada vez.','Consistência supera intensidade.','Progresso, não perfeição.','Cada hábito é um voto para quem você quer ser.','Não quebre a corrente.','Pequenos esforços, grandes resultados.'];
const NOW=new Date(), TY=NOW.getFullYear(), TM=NOW.getMonth(), TD=NOW.getDate();
const TABS=['tasks','agenda','notes','habitos'];

const EMOJI_CATS=[
  {cat:'💪 Saúde',e:['💧','🏃','🧘','🍎','💊','🛏','🚴','🏋','🥗','🦷','🧴','❤️','🫁','🩺','🥤','🧃']},
  {cat:'📚 Estudo',e:['📚','📖','✏️','🎓','💡','🧠','📝','🔬','📐','🖥','📊','🎯','📏','🔭']},
  {cat:'💼 Trabalho',e:['💼','📈','💰','✅','📧','🤝','🗂','⏰','📋','🖊','📌','🗓']},
  {cat:'🧘 Bem-estar',e:['🧘','☀️','🌙','😊','🙏','💆','🎵','🌿','🕯','🫶','🌸','🍃','🌊']},
  {cat:'🌱 Outros',e:['🌱','🌍','♻️','🎨','🎮','🚗','✈️','🐾','🎉','🌈','⭐','🔥','🏠','🎸']},
];

const BADGE_DEFS=[
  {id:'s5', grp:'🔥 Sequência', title:'Primeiros passos', desc:'5 dias consecutivos', icon:'🥉'},
  {id:'s30', grp:'🔥 Sequência', title:'Mês completo', desc:'30 dias consecutivos', icon:'🥇'},
  {id:'first', grp:'🌟 Especial', title:'Primeiro passo', desc:'Criou um hábito', icon:'🌱'},
  {id:'t100', grp:'⭐ Conclusões', title:'100 hábitos!', desc:'100 conclusões', icon:'🏆'}
];

const TUT_STEPS=[
  {ico:'👋',ttl:'Bem-vindo!',txt:'Seu organizador pessoal. Vamos mostrar as funções principais.',tab:null},
  {ico:'✅',ttl:'Tarefas',txt:'Crie tarefas com data, hora e notificação.',tab:'tasks'},
  {ico:'📅',ttl:'Agenda',txt:'Visualize tudo no calendário. Toque em um dia para detalhes.',tab:'agenda'},
  {ico:'⏰',ttl:'Hábitos',txt:'Crie hábitos com metas diárias e use o Timer de Foco.',tab:'habitos'}
];

// --- VARIÁVEIS DE ESTADO ---
let tasks=[], notes=[], events={}, habits=[], cfg={dark:false,name:'',greet:''};
let tutStep=0, enid=null, doneExp=false, focusH=null, focTmr=null;
let cY=TY, cM=TM, selD=null, calView='month', wkOff=0;
let hfd={id:null,icon:'⭐',name:'',color:'#54A0FF',target:1,times:[],frequency:'daily',customDays:[],reminderTime:''};

// --- UTILITÁRIOS ---
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const getDK=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const ck=(y,m,d)=>`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

// --- STORAGE ---
function load(){
  try {
    tasks=JSON.parse(localStorage.getItem('o_tasks'))||[];
    notes=JSON.parse(localStorage.getItem('o_notes'))||[];
    events=JSON.parse(localStorage.getItem('o_events'))||{};
    habits=JSON.parse(localStorage.getItem('o_habits2'))||[];
    const c=JSON.parse(localStorage.getItem('o_cfg')); if(c) cfg={...cfg,...c};
  } catch(e){ console.error("Erro no load", e); }
}
function save(){
  localStorage.setItem('o_tasks',JSON.stringify(tasks));
  localStorage.setItem('o_notes',JSON.stringify(notes));
  localStorage.setItem('o_events',JSON.stringify(events));
  localStorage.setItem('o_habits2',JSON.stringify(habits));
  localStorage.setItem('o_cfg',JSON.stringify(cfg));
}

// --- INTERFACE (TABS & THEME) ---
function swTab(name,btn){
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tb').forEach(b=>b.classList.remove('active'));
  document.getElementById('sec-'+name).classList.add('active');
  if(btn) btn.classList.add('active'); else document.getElementById('tb-'+name).classList.add('active');
}
function toggleTheme(on){ cfg.dark=on; save(); applyTheme(); }
function applyTheme(){ document.documentElement.setAttribute('data-theme',cfg.dark?'dark':''); document.getElementById('tog-dark').checked=cfg.dark; }
function applyName(){ document.getElementById('aname').textContent=cfg.name||'Meu Organizador'; document.getElementById('dlbl').textContent=cfg.greet||NOW.toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'}); }

// --- TAREFAS ---
function renderTasks(){
  const pEl=document.getElementById('t-pend'), dEl=document.getElementById('t-done-wrap');
  const pend=tasks.filter(t=>!t.done), done=tasks.filter(t=>t.done);
  pEl.innerHTML = pend.length ? `<p class="lbl">Pendentes · ${pend.length}</p>` + pend.map(t=>`<div class="ti">
    <div class="tck" onclick="togTask(${t.id})"></div>
    <div class="tb2"><div class="tt">${esc(t.text)}</div></div>
    <button class="bd" onclick="delTask(${t.id})">×</button></div>`).join('') : '<p class="empty">Tudo em dia!</p>';
  dEl.innerHTML = done.length ? `<button class="dtoggle" onclick="doneExp=!doneExp;renderTasks()">Concluídas (${done.length})</button>` : '';
}
function addTask(){ 
  const val=document.getElementById('task-in').value.trim(); 
  if(val){ tasks.unshift({id:Date.now(),text:val,done:false}); document.getElementById('task-in').value=''; save(); renderTasks(); } 
}
function togTask(id){ tasks=tasks.map(t=>t.id===id?{...t,done:!t.done}:t); save(); renderTasks(); }
function delTask(id){ tasks=tasks.filter(t=>t.id!==id); save(); renderTasks(); }

// --- CALENDÁRIO ---
function setView(v){ calView=v; renderCal(); }
function renderCal(){
  const main=document.getElementById('cal-main');
  if(calView==='month'){
    let h=`<div class="cnr"><button onclick="chMonth(-1)">‹</button><span>${MO[cM]} ${cY}</span><button onclick="chMonth(1)">›</button></div><div class="cdow">${DL.map(d=>`<span>${d[0]}</span>`).join('')}</div><div class="cgrid">`;
    const fd=new Date(cY,cM,1).getDay(), dim=new Date(cY,cM+1,0).getDate();
    for(let i=0;i<fd;i++) h+='<div class="cc emp"></div>';
    for(let d=1;d<=dim;d++) h+=`<div class="cc ${d===TD&&cM===TM?'today':''}" onclick="selDay(${d})">${d}</div>`;
    main.innerHTML=h+'</div>';
  }
}
function chMonth(dir){ cM+=dir; if(cM<0){cM=11;cY--;} if(cM>11){cM=0;cY++;} renderCal(); }
function selDay(d){ selD=d; document.getElementById('ev-sec').style.display='block'; document.getElementById('ev-dlbl').textContent=`${d} de ${MO[cM]}`; }

// --- NOTAS ---
function openNote(id){ enid=id; document.getElementById('nlv').style.display='none'; document.getElementById('nev').classList.add('open'); }
function closeNote(){ document.getElementById('nlv').style.display='flex'; document.getElementById('nev').classList.remove('open'); }
function saveNote(){ 
  const t=document.getElementById('nt-ttl').value, b=document.getElementById('nt-bdy').value;
  if(enid==='new') notes.unshift({id:Date.now(),title:t,body:b,date:new Date().toLocaleDateString()});
  save(); renderNotes(); closeNote(); 
}
function renderNotes(){ document.getElementById('ngrid').innerHTML=notes.map(n=>`<div class="nc" onclick="openNote(${n.id})"><h3>${esc(n.title)}</h3><p>${esc(n.body)}</p></div>`).join(''); }

// --- HÁBITOS ---
function renderHabits(){
  const list=document.getElementById('hab-list');
  list.innerHTML=habits.map(h=>`<div class="hcard" onclick="openFocus(${h.id})">
    <div class="hcbar" style="background:${h.color}"></div>
    <div class="hcbody"><strong>${h.icon} ${esc(h.name)}</strong></div></div>`).join('') + `<button class="bnn" onclick="openHF()">+ Novo Hábito</button>`;
}
function openHF(){ document.getElementById('mo-hf').classList.add('open'); renderHF(); }
function closeHF(){ document.getElementById('mo-hf').classList.remove('open'); }
function renderHF(){ document.getElementById('hf-body').innerHTML=`<input type="text" placeholder="Nome" oninput="hfd.name=this.value">`; }
function saveHabit(){ habits.push({...hfd, id:Date.now()}); save(); renderHabits(); closeHF(); }

// --- TUTORIAL & CONQUISTAS ---
function startTutorial(){ if(!localStorage.getItem('o_tut_done')) document.getElementById('tut').style.display='flex', showStep(); }
function showStep(){ const s=TUT_STEPS[tutStep]; document.getElementById('tut-ico').textContent=s.ico; document.getElementById('tut-ttl').textContent=s.ttl; document.getElementById('tut-txt').textContent=s.txt; if(s.tab) swTab(s.tab); }
function nextTut(){ if(tutStep<TUT_STEPS.length-1) { tutStep++; showStep(); } else endTutorial(); }
function endTutorial(){ document.getElementById('tut').style.display='none'; localStorage.setItem('o_tut_done','true'); }
function openAch(){ document.getElementById('mo-ach').classList.add('open'); }

// --- CONFIG ---
function openCfg(){ document.getElementById('mo-cfg').classList.add('open'); }
function closeCfg(){ document.getElementById('mo-cfg').classList.remove('open'); }
function saveName(){ cfg.name=document.getElementById('cfg-name').value; save(); applyName(); }

// --- INICIALIZAÇÃO ---
window.onload=()=>{
  load(); applyTheme(); applyName(); renderTasks(); renderNotes(); renderCal(); renderHabits(); startTutorial();
};
</script>
</body>
</html>
