<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
<meta name="theme-color" content="#fff"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<link rel="manifest" href="./manifest.json"/>
<title>Meu Organizador</title>
<style>
/* Mantém todo o seu CSS original, apenas com ajustes */

/* Notas ocupando linha inteira */
.ng {
  display: flex;
  flex-direction: column;
  gap: 9px;
}
.nc {
  border-radius: 11px;
  border:.5px solid var(--brd);
  padding: 13px;
  cursor: pointer;
  background: var(--card);
  width: 100%;
}

/* Botão de conquistas */
.btn-conquistas {
  background: var(--ac);
  color: var(--acfg);
  border: none;
  border-radius: 9px;
  padding: 10px 14px;
  font-size: 14px;
  cursor: pointer;
  margin: 10px;
}

/* Tutorial inicial */
.tutorial {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.7);
  color: #fff;
  display: none;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 20px;
  z-index: 200;
}
.tutorial.active {
  display: flex;
}
.tutorial button {
  margin-top: 20px;
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  background: #fff;
  color: #000;
  cursor: pointer;
}
</style>
</head>
<body>
<div id="app">

  <div class="hdr">
    <div>
      <h1 id="aname">Meu Organizador</h1>
      <p id="dlbl"></p>
    </div>
    <button class="gear-btn" onclick="openCfg()" title="Configurações">⚙️</button>
  </div>

  <div class="cnt" id="cnt">
    <!-- TAREFAS -->
    <div id="sec-tasks" class="sec active">
      <!-- conteúdo original mantido -->
    </div>

    <!-- AGENDA -->
    <div id="sec-agenda" class="sec">
      <!-- conteúdo original mantido -->
    </div>

    <!-- NOTAS -->
    <div id="sec-notes" class="sec">
      <div id="nlv">
        <button class="bnn" onclick="openNote('new')">+ Nova anotação</button>
        <div id="ngrid" class="ng"></div>
      </div>
      <div id="nev">
        <div class="neh">
          <button class="bbk" onclick="closeNote()">← Voltar</button>
          <button class="bsv" onclick="saveNote()">Salvar</button>
        </div>
        <input type="text" id="nt-ttl" placeholder="Título"/>
        <textarea id="nt-bdy" placeholder="Escreva sua nota..."></textarea>
      </div>
    </div>

    <!-- HÁBITOS -->
    <div id="sec-habitos" class="sec">
      <div id="hab-list" style="flex:1;overflow-y:auto"></div>
      <button class="btn-conquistas" onclick="openConquistas()">🏆 Conquistas</button>
    </div>
  </div>

  <div class="tabbar">
    <button id="tb-tasks" class="tb active" onclick="swTab('tasks',this)">Tarefas</button>
    <button id="tb-agenda" class="tb" onclick="swTab('agenda',this)">Agenda</button>
    <button id="tb-notes" class="tb" onclick="swTab('notes',this)">Notas</button>
    <button id="tb-habitos" class="tb" onclick="swTab('habitos',this)">Hábitos</button>
  </div>
</div>

<!-- Tutorial inicial -->
<div id="tutorial" class="tutorial">
  <h2>Bem-vindo ao Meu Organizador</h2>
  <p>Aqui você pode gerenciar tarefas, agenda, notas e hábitos.<br>
  Use as abas abaixo para navegar.<br>
  Clique em ⚙️ para configurações.</p>
  <button onclick="closeTutorial()">Entendi</button>
</div>

<script src="app.js"></script>
</body>
</html>
